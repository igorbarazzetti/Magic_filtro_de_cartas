<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Card Search</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(20, 28, 45, 0.85);
        --panel-soft: rgba(255, 255, 255, 0.08);
        --text: #f5f8ff;
        --muted: #b9c2d9;
        --accent: #6fd1ff;
        --accent-soft: #8be3ff;
        --danger: #ff7b7b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #192a58, var(--bg) 52%),
          linear-gradient(135deg, #121b2f, #0d1629);
        min-height: 100vh;
      }

      .page {
        max-width: 1140px;
        margin: 0 auto;
        padding: 24px 20px 40px;
      }

      header {
        text-align: center;
        padding: 24px 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.8rem);
      }

      p.description {
        margin: 8px auto 0;
        max-width: 780px;
        color: var(--muted);
      }

      .search-wrap {
        margin: 26px auto 0;
        max-width: 700px;
        display: flex;
        gap: 10px;
        position: relative;
        background: var(--panel);
        border: 1px solid var(--panel-soft);
        padding: 10px;
        border-radius: 14px;
      }

      .search-wrap input {
        flex: 1;
        border: 0;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        padding: 14px 16px;
        border-radius: 10px;
        font-size: 1rem;
      }

      .search-wrap input:focus {
        outline: 2px solid rgba(111, 209, 255, 0.45);
      }

      .search-wrap button {
        border: 0;
        background: linear-gradient(135deg, var(--accent), #7b6bff);
        color: #08101f;
        padding: 12px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
      }

      .search-wrap button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .suggestions-dropdown {
        position: absolute;
        left: 10px;
        right: 10px;
        top: calc(100% + 8px);
        margin: 0;
        padding: 6px;
        list-style: none;
        border: 1px solid var(--panel-soft);
        background: rgba(10, 16, 35, 0.98);
        border-radius: 10px;
        box-shadow: 0 12px 20px rgba(1, 6, 15, 0.45);
        z-index: 8;
        max-height: 220px;
        overflow: auto;
      }

      .suggestions-dropdown[hidden] {
        display: none;
      }

      .suggestions-dropdown li {
        margin: 0;
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 7px;
        color: var(--text);
      }

      .suggestions-dropdown li:hover {
        background: rgba(143, 218, 255, 0.14);
      }

      .status {
        margin: 12px auto;
        color: var(--muted);
        min-height: 1.4rem;
      }

      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
        margin: 16px 0 4px;
      }

      .card {
        border: 1px solid var(--panel-soft);
        background: var(--panel);
        border-radius: 12px;
        overflow: hidden;
        transition: transform 120ms ease, border-color 120ms ease;
      }

      .card:hover {
        transform: translateY(-3px);
        border-color: rgba(143, 218, 255, 0.35);
      }

      .card-media {
        position: relative;
      }

      .card button {
        all: unset;
        width: 100%;
        text-align: left;
        cursor: pointer;
      }

      .card img {
        width: 100%;
        display: block;
        border-bottom: 1px solid var(--panel-soft);
        background: #090f1c;
      }

      .card-rotate-btn {
        position: absolute;
        left: 8px;
        top: 8px;
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid var(--panel-soft);
        background: rgba(10, 16, 32, 0.84);
        color: var(--accent-soft);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 700;
        z-index: 3;
        user-select: none;
      }

      .card-rotate-btn:hover {
        color: #0b1220;
        background: var(--accent-soft);
      }

      .card-rotate-btn[hidden] {
        display: none;
      }

      .detail-image-wrap {
        position: relative;
      }

      .card-info {
        padding: 10px;
      }

      .card-info h3 {
        margin: 0;
        font-size: 1rem;
      }

      .card-info p {
        margin: 6px 0 0;
        font-size: 0.86rem;
        color: var(--muted);
      }

      .mana-symbol {
        display: inline-flex;
        width: 1.15rem;
        height: 1.15rem;
        align-items: center;
        justify-content: center;
        vertical-align: -0.18em;
        margin-right: 0.15rem;
      }

      .mana-symbol img {
        width: 100%;
        height: 100%;
      }

      .mana-symbol-fallback {
        display: inline-flex;
        width: 1.15rem;
        height: 1.15rem;
        border-radius: 50%;
        align-items: center;
        justify-content: center;
        background: #27334d;
        color: #f5f7ff;
        font-size: 0.67rem;
        font-weight: 700;
        margin-right: 0.15rem;
        vertical-align: -0.18em;
      }

      .mana-label {
        display: inline-flex;
        align-items: center;
        gap: 0.15rem;
        margin: 2px 0 0;
        flex-wrap: wrap;
      }

      .meta-line {
        margin: 0.2rem 0;
      }

      .similar-score-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.35rem;
      }

      .similar-score-label {
        color: var(--accent-soft);
        font-weight: 700;
        font-size: 0.84rem;
      }

      .similar-score-bar {
        flex: 1;
        max-width: 96px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        position: relative;
        overflow: hidden;
      }

      .similar-score-bar span {
        position: absolute;
        inset: 0 auto 0 0;
        background: linear-gradient(90deg, #6fd1ff, #8be3ff);
      }

      .similar-reasons {
        margin: 0.38rem 0 0;
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.3;
      }

      .dot {
        display: inline-block;
        margin: 0 0.35rem;
        color: var(--muted);
      }

      .section {
        margin-top: 28px;
      }

      .panel {
        border: 1px solid var(--panel-soft);
        background: rgba(12, 19, 35, 0.75);
        border-radius: 14px;
        padding: 16px;
      }

      .section h2 {
        margin: 0 0 12px;
      }

      .detail-grid {
        display: grid;
        gap: 18px;
        grid-template-columns: minmax(170px, 250px) minmax(300px, 1fr);
        align-items: center;
      }

      .detail-text {
        color: var(--muted);
        line-height: 1.5;
      }

      .detail-text strong {
        color: var(--text);
      }

      .detail-card img {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--panel-soft);
      }

      .empty-state {
        color: var(--muted);
        padding: 10px 2px;
      }

      @media (max-width: 800px) {
        .detail-grid {
          grid-template-columns: 1fr;
        }

        .search-wrap {
          flex-direction: column;
        }

        .search-wrap button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Magic The Gathering Card Finder</h1>
        <p class="description">
          Busque cartas no Scryfall, clique em uma carta e veja opÃ§Ãµes parecidas por
          tipo e cor com base no perfil da carta selecionada.
        </p>

        <form class="search-wrap" id="searchForm">
          <input
            id="queryInput"
            type="text"
            placeholder="Digite nome, cor, tipo ou texto da carta"
            autocomplete="on"
            list="cardSuggestions"
          />
          <ul id="suggestionsDropdown" class="suggestions-dropdown" hidden></ul>
          <datalist id="cardSuggestions"></datalist>
          <button id="searchBtn" type="submit">Buscar</button>
        </form>
        <p class="status" id="status"></p>
      </header>

      <section class="section">
        <h2>Resultados</h2>
        <div id="results" class="cards-grid"></div>
      </section>

      <section class="section">
        <div class="panel" id="detailPanel">
          <h2>Detalhes e cartas parecidas</h2>
          <div id="detailContent" class="empty-state">Escolha uma carta para ver detalhes e sugestÃµes.</div>
          <div id="similarWrap" style="display: none;">
            <h2 style="margin-top: 20px; margin-bottom: 12px">Mais parecidas</h2>
            <div id="similarCards" class="cards-grid"></div>
          </div>
        </div>
      </section>
    </main>

            signals.control = clamp(0.6 + normalizedLoyalty / 2);
          }
          if (hasTextToken(normalizedText, ['+'])) {
            signals.control = clamp(Math.max(signals.control || 0, 0.65));
          }
          signals.removal = clamp(Math.max(signals.removal || 0, 0.2));
        }

        if (hasInstantOrSorcery) {
          if (textTokens.has('draw') || textTokens.has('search')) signals.draw = clamp(Math.max(signals.draw || 0, 0.7));
          if (textTokens.has('counter') || textTokens.has('prevent')) signals.control = clamp(Math.max(signals.control || 0, 0.6));
          if (textTokens.has('destroy') || textTokens.has('exile') || textTokens.has('sacrifice')) {
            signals.removal = clamp(Math.max(signals.removal || 0, 0.8));
          }
        }

        return signals;
      }

      function normalizeMechanicSignalId(rawId = '') {
        const normalized = safeLower(rawId)
          .replace(/\s+/g, '_')
          .replace(/[^a-z0-9_]/g, '')
          .replace(/^_+|_+$/g, '')
          .replace(/^sigsig_/, 'sig_');
        if (!normalized) return '';
        return PRIMARY_MECHANIC_CANONICAL_ALIASES[normalized] || normalized;
      }

      function normalizePrimaryMechanicId(mechanicId = '') {
        return normalizeMechanicSignalId(mechanicId);
      }

      function normalizePrimaryMechanicCollection(values = []) {
        return uniqueValues(Array.isArray(values) ? values : []).map((mechanicId) => normalizePrimaryMechanicId(mechanicId));
      }

      function buildPrimaryMechanicProfile({ abilityIntents = [], eventSignatures = [], keywordTokens = [], oracleText = '' }) {
        const candidates = new Map();
        const inferredHints = uniqueValues(inferPrimaryMechanicHintsFromText(oracleText));
        const hintSignatures = materializeMechanicHintSignatures(inferredHints);
        const mergedEventSignatures = [...(Array.isArray(eventSignatures) ? eventSignatures : []), ...hintSignatures];
        const addMechanicScore = (mechanicId, score = 0) => {
          const id = normalizePrimaryMechanicId(mechanicId);
          if (!id) return;
          const normalized = { id, score: Number(score) || 0 };
          if (!candidates.has(id) || normalized.score > (candidates.get(id)?.score || 0)) {
            candidates.set(id, normalized);
          }
        };

        (Array.isArray(abilityIntents) ? abilityIntents : []).forEach((rawIntent) => {
          const intent = typeof rawIntent === 'string'
            ? rawIntent
            : rawIntent?.id;
          const normalizedIntent = normalizePrimaryMechanicId(intent);
          if (!normalizedIntent) return;
          const source = typeof rawIntent === 'string' ? null : rawIntent;
          const baseWeight = Number(source?.weight || 1);
          const confidence = Number(source?.confidence || 0.72);
          addMechanicScore(normalizedIntent, baseWeight * confidence);
        });

        mergedEventSignatures.forEach((rawSignature) => {
          const signature = typeof rawSignature === 'string'
            ? rawSignature
            : rawSignature?.id;
          const normalizedSignature = normalizePrimaryMechanicId(signature);
          if (!normalizedSignature) return;
          const source = typeof rawSignature === 'string' ? null : rawSignature;
          const baseWeight = Number(source?.weight || 1);
          const scoreWeight = Number(source?.scoreWeight || 1);
          const confidence = Number(source?.confidence || 0.62);
          addMechanicScore(normalizedSignature, baseWeight * scoreWeight * confidence * 0.75);
        });

        const normalizedText = normalizeIntentText(oracleText);
        if (normalizedText) {
          const eventSignatureIds = new Set(
            mergedEventSignatures.map((entry) => normalizeMechanicSignalId(typeof entry === 'string' ? entry : entry?.id || ''))
          );
          const hasLifeDrainEvidence = eventSignatureIds.has('sig_death_to_life_drain')
            || eventSignatureIds.has('sig_life_drain_on_creature_dies')
            || eventSignatureIds.has('sig_death_life_exchange')
            || eventSignatureIds.has('sig_creature_life_transfer')
            || hasLifeDrainExchangePattern(normalizedText);
          const hasCombatTransferEvidence = eventSignatureIds.has('sig_combat_involvement') || hasAnyToken(normalizedText, ['combat damage', 'combat', 'fighter']);

          const keywordBoosts = {
            destroy: ['sig_counter_or_remove'],
            exile: ['sig_counter_or_remove'],
            remove: ['sig_counter_or_remove'],
            counter: ['counter_or_remove'],
            sacrifice: ['sig_sacrifice_value'],
            sac: ['sig_sacrifice_value'],
            draw: ['draw_or_discard'],
            discard: ['sig_draw_or_discard'],
            battlefield: ['sig_enter_battlefield', 'enter_battlefield'],
            'enters the battlefield': ['sig_enter_battlefield', 'enter_battlefield'],
            life: ['life_adjustment'],
            lifelink: ['life_adjustment'],
            'life drain': ['sig_death_to_life_drain', 'sig_life_drain_on_creature_dies', 'sig_death_life_exchange'],
            'life transfer': ['sig_creature_life_transfer'],
            'lose life': ['sig_life_adjustment'],
            death: ['sig_creature_death', 'death_to_life_drain'],
            dies: ['sig_creature_death', 'death_to_life_drain'],
            combat: ['combat_transfer', 'sig_combat_involvement'],
            attack: ['combat_transfer'],
            attacker: ['sig_combat_involvement'],
          };

          Object.entries(keywordBoosts).forEach(([token, boosts]) => {
            if (!safeLower(normalizedText).includes(token)) return;
            boosts.forEach((boostId) => addMechanicScore(boostId, 0.45));
          });

          if (hasLifeDrainEvidence) {
            addMechanicScore('sig_death_to_life_drain', 0.76);
            addMechanicScore('death_to_life_drain', 0.62);
          }

          if (hasCombatTransferEvidence && hasAnyToken(normalizedText, ['flying', 'evasion'])) {
            addMechanicScore('combat_transfer', 0.58);
          }
        }

        const ordered = Array.from(candidates.entries())
          .map(([id, entry]) => ({ id, score: entry.score }))
          .filter((entry) => entry.id)
          .sort((left, right) => {
            const leftPriority = PRIMARY_MECHANIC_PRIORITY.indexOf(left.id);
            const rightPriority = PRIMARY_MECHANIC_PRIORITY.indexOf(right.id);
            if (leftPriority !== -1 || rightPriority !== -1) {
              const leftRank = leftPriority === -1 ? Number.MAX_SAFE_INTEGER : leftPriority;
              const rightRank = rightPriority === -1 ? Number.MAX_SAFE_INTEGER : rightPriority;
              if (leftRank !== rightRank) return leftRank - rightRank;
            }
            return (right.score || 0) - (left.score || 0);
          });

        const selected = ordered.slice(0, 5);
        const mechanics = selected.map((entry) => entry.id);
        mechanics.__scores = Object.fromEntries(selected.map((entry) => [entry.id, clamp(entry.score)]));
        return mechanics;
      }

      function getPrimaryMechanicScore(profile = {}, mechanicId = '') {
        const scores = profile?.primaryMechanicScores || {};
        const fallback = Array.isArray(profile) ? profile.__scores || {} : {};
        const normalized = safeLower(mechanicId);
        if (!normalized) return 0;
        return Number(fallback[normalized] || scores[normalized] || 0);
      }

      function getPrimaryMechanicQueryTerms(mechanicId) {
        return uniqueValues(
          PRIMARY_MECHANIC_TERM_MAP[safeLower(mechanicId)] || PRIMARY_MECHANIC_TERM_MAP[safeLower(mechanicId.replace(/^sig_/, ''))] || []
        ).slice(0, 3);
      }

      function getPrimaryMechanicCoreSignatures(mechanicId) {
        const normalized = safeLower(mechanicId);
        return uniqueValues(
          PRIMARY_MECHANIC_CORE_SIGNATURES[safeLower(normalized)] ||
            PRIMARY_MECHANIC_CORE_SIGNATURES[safeLower(normalized.replace(/^sig_/, ''))] || []
        );
      }

      function getPrimaryMechanicTextSignalSet(mechanicId = '') {
        const normalized = safeLower(mechanicId);
        return uniqueValues(
          PRIMARY_MECHANIC_TEXT_SIGNAL_MAP[safeLower(normalized)] ||
            PRIMARY_MECHANIC_TEXT_SIGNAL_MAP[safeLower(normalized.replace(/^sig_/, ''))] ||
            []
        );
      }

      function getPrimaryMechanicAlignmentMode(seedScore) {
        if (seedScore >= PRIMARY_MECHANIC_HARD_ALIGN_SCORE) return 'hard';
        if (seedScore >= PRIMARY_MECHANIC_SOFT_ANCHOR_MIN) return 'soft';
        if (seedScore > 0) return 'weak';
        return 'none';
      }

      function hasPrimaryMechanicAffinity(seedProfile = {}, candidateProfile = {}, mechanicId = '') {
        const normalized = safeLower(mechanicId);
        if (!normalized) return false;
        const candidateMechanics = uniqueValues(candidateProfile?.primaryMechanics || []);
        if (candidateMechanics.includes(normalized)) return true;

        const alignmentSignals = getPrimaryMechanicCoreSignatures(normalized);
        if (!alignmentSignals.length) return false;
        const seedSignatures = new Set(
          (seedProfile?.eventSignatures || []).map((entry) => safeLower(entry?.id || ''))
        );
        const candidateSignatures = new Set(
          (candidateProfile?.eventSignatures || []).map((entry) => safeLower(entry?.id || ''))
        );

        const coreOverlap = alignmentSignals.some((signal) => seedSignatures.has(signal) && candidateSignatures.has(signal));
        if (coreOverlap) return true;

        return hasPrimaryMechanicEventEvidence(seedProfile, candidateProfile, normalized);
      }

      function evaluatePrimaryMechanicAlignment(seedProfile = {}, candidateProfile = {}) {
        const seedMechanics = normalizePrimaryMechanicCollection(seedProfile?.primaryMechanics || []);
        const candidateMechanics = normalizePrimaryMechanicCollection(candidateProfile?.primaryMechanics || []);
        const topMechanic = seedMechanics[0] || '';
        const topMechanicScore = getPrimaryMechanicScore(seedProfile, topMechanic);
        const mode = getPrimaryMechanicAlignmentMode(topMechanicScore);

        if (!topMechanic || !mode) {
          return {
            topMechanic,
            topMechanicScore,
            mode: 'no-anchor',
            matchMode: 'none',
            hasAffinity: false,
            directMatch: false,
            coreMatch: false,
            bucketMatch: false,
            sharedBuckets: getSharedMechanicBuckets(seedProfile, candidateProfile),
            sharedCount: 0,
            hardAnchor: false,
            score: 0,
          };
        }

        const topMechanicInCandidate = candidateMechanics.includes(topMechanic);
        const seedSignatures = new Set(
          (seedProfile?.eventSignatures || []).map((entry) => safeLower(entry?.id || ''))
        );
        const candidateSignatures = new Set(
          (candidateProfile?.eventSignatures || []).map((entry) => safeLower(entry?.id || ''))
        );
        const coreSignatures = getPrimaryMechanicCoreSignatures(topMechanic);
        const coreOverlap = coreSignatures.filter((signature) => seedSignatures.has(signature) && candidateSignatures.has(signature));
        const anchorSignals = getPrimaryMechanicAnchorSignals(topMechanic);
        const anchorMatch = anchorSignals.length
          ? anchorSignals.some((signalId) => candidateSignatures.has(safeLower(signalId)))
          : false;
        const sharedBuckets = getSharedMechanicBuckets(seedProfile, candidateProfile);
        const topMechanicIndex = candidateMechanics.indexOf(topMechanic) === 0 ? 1 : 0;
        const sharedCount = candidateMechanics.filter((mechanic) => seedMechanics.includes(mechanic)).length;

        const directMatch = topMechanicInCandidate;
        const coreMatch = coreOverlap.length > 0 || anchorMatch;
        const bucketMatch = sharedBuckets.length > 0;
        const hasAffinity = directMatch || coreMatch;
        const matchMode = directMatch
          ? 'direct'
          : coreMatch
            ? 'core'
            : bucketMatch
              ? 'bucket'
              : 'fallback';
        const bucketBoost = sharedBuckets.length ? clamp(sharedBuckets.reduce((acc) => acc + 0.22, 0) / sharedBuckets.length, 0, 1) : 0;
        let score = 0;
        if (directMatch) score = PRIMARY_MECHANIC_DIRECT_MATCH_SCORE;
        else if (coreMatch) score = PRIMARY_MECHANIC_CORE_MATCH_SCORE;
        else if (bucketMatch) score = PRIMARY_MECHANIC_AFFINITY_MIN;
        else if (mode === 'soft' && sharedCount >= 1) score = 0.34;
        else if (mode === 'weak' && sharedCount >= 1) score = 0.28;
        else score = 0;

        return {
          topMechanic,
          topMechanicScore,
          mode,
          matchMode,
          hasAffinity,
          directMatch,
          coreMatch,
          bucketMatch,
          sharedBuckets,
          sharedCount,
          hardAnchor: topMechanicScore >= PRIMARY_MECHANIC_HARD_ANCHOR_MIN,
          score: clamp(score + topMechanicIndex * 0.02 + bucketBoost * 0.06),
        };
      }

      function getPrimaryMechanicAnchorSignals(mechanicId = '') {
        return uniqueValues(PRIMARY_MECHANIC_EVENT_BRIDGES[safeLower(mechanicId)] || []);
      }

      function hasPrimaryMechanicEventEvidence(seedProfile = {}, candidateProfile = {}, mechanicId = '') {
        const targetMechanic = safeLower(mechanicId);
        if (!targetMechanic) return false;
        const anchorSignals = new Set(getPrimaryMechanicAnchorSignals(targetMechanic));
        if (!anchorSignals.size) return false;

        const seedText = safeLower(seedProfile?.eventSignatures?.map((entry) => entry?.id || '').join(' ') || '');
        const candidateText = safeLower(candidateProfile?.eventSignatures?.map((entry) => entry?.id || '').join(' ') || '');
        for (const signalId of anchorSignals) {
          if (seedText.includes(signalId) && candidateText.includes(signalId)) return true;
        }

        const seedMap = new Set((seedProfile?.eventSignatures || []).map((entry) => safeLower(entry?.id || '')));
        const candidateMap = new Set((candidateProfile?.eventSignatures || []).map((entry) => safeLower(entry?.id || '')));
        return anchorSignals.size && [...anchorSignals].some((signalId) => seedMap.has(signalId) && candidateMap.has(signalId));
      }

      function formatPrimaryMechanicLabel(mechanicId) {
        const id = safeLower(mechanicId);
        return PRIMARY_MECHANIC_LABELS[id] || PRIMARY_MECHANIC_LABELS[id.replace(/^sig_/, '')] || id || 'mecânica principal';
      }

      function getSharedPrimaryMechanics(seed = {}, candidate = {}) {
        const seedMechanics = uniqueValues(seed?.primaryMechanics || []);
        const candidateMechanics = new Set(uniqueValues(candidate?.primaryMechanics || []));
        return seedMechanics.filter((mechanic) => candidateMechanics.has(mechanic));
      }

      function buildPrimaryMechanicBuckets(primaryMechanics = []) {
        const mechanics = uniqueValues(primaryMechanics).filter(Boolean);
        if (!mechanics.length) return {};

        const buckets = {};
        mechanics.forEach((mechanic, index) => {
          const mechanism = safeLower(mechanic);
          const mechanicWeight = clamp(1 - index * 0.12);
          const bucketEntries = Object.entries(PRIMARY_MECHANIC_BUCKETS).filter(([, members]) => members.includes(mechanism));
          bucketEntries.forEach(([bucket]) => {
            buckets[bucket] = clamp(Math.max(Number(buckets[bucket] || 0), mechanicWeight));
          });
        });

        return Object.fromEntries(
          Object.entries(buckets)
            .filter(([, score]) => score > 0)
            .map(([bucket, score]) => [bucket, clamp(score)])
        );
      }

      function getPrimaryMechanicBucketClause(profile, maxTerms = 1) {
        const bucketScores = Object.entries(profile?.primaryMechanicBuckets || {})
          .filter(([, score]) => Number(score) > 0)
          .sort((left, right) => (right[1] || 0) - (left[1] || 0))
          .slice(0, maxTerms);

        const tokens = [];
        bucketScores.forEach(([bucket]) => {
          const options = PRIMARY_MECHANIC_BUCKET_QUERY_MAP[safeLower(bucket)] || [];
          tokens.push(...options);
        });

        return bucketTokensToOracleClause(tokens, 2);
      }

      function bucketLabel(bucket) {
        return PRIMARY_MECHANIC_BUCKET_LABELS[safeLower(bucket)] || safeLower(bucket) || 'mecânica de grupo';
      }

      function hasTextToken(text, tokens = []) {
        const normalized = safeLower(text || '');
        return tokens.some((token) => normalized.includes(safeLower(token)));
      }

      function buildPhaseSignals(oracleText) {
        const normalized = safeLower(oracleText || '');
        const signals = {};
        Object.entries(PHASE_SIGNAL_PATTERNS).forEach(([key, patterns]) => {
          const hit = patterns.some((pattern) => normalized.includes(safeLower(pattern)));
          if (hit) signals[key] = 1;
        });
        return signals;
      }

      function buildAliasMap(values, weight = 1) {
        const aliases = {};
        uniqueValues(values).forEach((value) => {
          let alias = FAMILY_ALIAS_MAP[safeLower(value)] || safeLower(value);
          if (!alias) return;
          if (alias.endsWith('s') && !alias.endsWith('ss')) {
            const singular = alias.slice(0, -1);
            alias = FAMILY_ALIAS_MAP[singular] || singular;
          }
          aliases[safeLower(alias)] = Math.max(aliases[safeLower(alias)] || 0, weight);
        });
        return aliases;
      }

      function mergeWeightedSignals(primary = {}, secondary = {}, secondaryWeight = 0.5) {
        const merged = { ...primary };
        Object.entries(secondary).forEach(([name, score]) => {
          const normalizedName = safeLower(name);
          const weightedScore = clamp(Number(score) * secondaryWeight);
          if (weightedScore <= 0) return;
          const previous = Number(merged[normalizedName] || 0);
          if (weightedScore > previous) merged[normalizedName] = weightedScore;
        });
        return Object.fromEntries(
          Object.entries(merged)
            .filter(([, score]) => Number.isFinite(score) && score > 0)
            .map(([name, score]) => [safeLower(name), clamp(score)])
        );
      }

      function mergeManaVectors(primary, secondary = {}, secondaryWeight = 0.45) {
        const merged = { ...primary };
        Object.entries(secondary).forEach(([symbol, amount]) => {
          if (!MANA_VECTOR_KEYS.includes(symbol)) return;
          merged[symbol] = Number.isFinite(amount)
            ? (merged[symbol] || 0) + amount * secondaryWeight
            : merged[symbol] || 0;
        });
        return merged;
      }

      function weightedAliasJaccard(a = {}, b = {}) {
        const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
        if (!keys.size) return 0;

        let intersection = 0;
        let union = 0;
        keys.forEach((key) => {
          const left = Number(a[key] || 0);
          const right = Number(b[key] || 0);
          intersection += Math.min(left, right);
          union += Math.max(left, right);
        });

        return union > 0 ? clamp(intersection / union) : 0;
      }

      function buildCardProfile(card, faceIndex = 0) {
        const normalizedFace = normalizeFaceIndex(card, faceIndex);
        const profileKey = buildProfileCacheKey(card, normalizedFace);
        const cachedProfile = cardProfileCache.get(profileKey);
        if (cachedProfile && Date.now() - cachedProfile.ts <= PROFILE_CACHE_TTL_MS) {
          return cachedProfile.value;
        }

        const source = getPrimaryFace(card, faceIndex);
        const sourceIndex = normalizedFace;
        const totalFaces = getFaceCount(card);
        const hasSecondaryFace = totalFaces > 1;
        const secondaryFace = hasSecondaryFace ? getPrimaryFace(card, sourceIndex + 1) : null;
        const secondaryTypeProfile = secondaryFace
          ? parseTypeProfile(secondaryFace.type_line || card.type_line || '')
          : null;
        const typeProfile = parseTypeProfile(source.type_line || card.type_line || '');
        const colors = uniqueValues(source.colors || card.colors || []);
        const colorIdentity = uniqueValues(source.color_identity || card.color_identity || colors || []);
        const oracleText = source.oracle_text || '';
        const secondaryOracleText = secondaryFace ? secondaryFace.oracle_text || '' : '';
        const keywordTokens = buildKeywordTokens(source, oracleText);
        const secondaryKeywordTokens = secondaryFace ? buildKeywordTokens(secondaryFace, secondaryOracleText) : [];
        const mergedKeywordTokens = mergeWeightedSignals(
          Object.fromEntries(keywordTokens.map((value) => [value, 1])),
          Object.fromEntries(secondaryKeywordTokens.map((value) => [value, 1])),
          0.5
        );
        const mergedKeywordList = Object.keys(mergedKeywordTokens);
        const oracleTokens = extractTextTokens(oracleText);
        const secondaryOracleTokens = extractTextTokens(secondaryOracleText);
        const mergedOracleTokens = uniqueValues([...oracleTokens, ...secondaryOracleTokens]);
        const parsedPower = parseNumericValue(source.power ?? card.power);
        const parsedToughness = parseNumericValue(source.toughness ?? card.toughness);
        const parsedLoyalty = parseNumericValue(source.loyalty ?? card.loyalty);
        const roleSignals = mergeWeightedSignals(
          buildRoleSignals(
            oracleText,
            keywordTokens,
            typeProfile.mainType,
            parsedPower,
            parsedToughness,
            parsedLoyalty
          ),
          buildRoleSignals(
            secondaryOracleText,
            secondaryKeywordTokens,
            secondaryTypeProfile?.mainType || '',
            parseNumericValue(secondaryFace?.power ?? ''),
            parseNumericValue(secondaryFace?.toughness ?? ''),
            parseNumericValue(secondaryFace?.loyalty ?? '')
          ),
          0.45
        );
        const phaseSignals = mergeWeightedSignals(
          buildPhaseSignals(oracleText),
          buildPhaseSignals(secondaryOracleText),
          0.35
        );
        const familyAliases = mergeWeightedSignals(
          buildAliasMap(typeProfile.subTypes),
          secondaryTypeProfile ? buildAliasMap(secondaryTypeProfile.subTypes) : {},
          0.5
        );
        const manaVector = mergeManaVectors(
          parseManaVector(source.mana_cost),
          parseManaVector(secondaryFace ? secondaryFace.mana_cost || '' : ''),
          0.35
        );
        const keywordSet = new Set(mergedKeywordList);
        const oracleSet = new Set(oracleTokens);
        const textBigrams = uniqueValues(extractTextNGrams(oracleTokens, 28));
        const abilityIntents = mergeAbilityIntents(
          getAbilityIntentSignals(oracleText),
          getAbilityIntentSignals(secondaryOracleText),
          0.45
        );
        const eventSignatures = mergeEventSignatures(
          extractAbilityEventSignatures(oracleText),
          extractAbilityEventSignatures(secondaryOracleText),
          0.45
        );
        const causalSignatures = uniqueValues(
          [...extractCausalTransferSignatures(oracleText || ''), ...extractCausalTransferSignatures(secondaryOracleText || '')]
        );
        const primaryMechanics = buildPrimaryMechanicProfile({
          abilityIntents,
          eventSignatures,
          keywordTokens: mergedKeywordList,
          oracleText: `${oracleText || ''} ${secondaryOracleText || ''}`.trim(),
        });
        const primaryMechanicScores = primaryMechanics.__scores || {};
        const primaryMechanicBuckets = buildPrimaryMechanicBuckets(primaryMechanics);
        const semanticSignalConfidence = eventSignatures.length
          ? eventSignatures.reduce((acc, signature) => acc + Number(signature.confidence || 0), 0) / eventSignatures.length
          : 0;

        const profile = {
          id: card.id,
          oracleId: card.oracle_id || card.id,
          name: getCardTitle(card, faceIndex),
          mainType: typeProfile.mainType,
          superTypes: typeProfile.superTypes,
          familyTypes: typeProfile.familyTypes,
          subTypes: typeProfile.subTypes,
          familyAliases,
          colors,
          colorIdentity,
          cmc: parseNumericValue(source.cmc ?? card.cmc),
          manaVector,
          manaPattern: buildManaPattern(source.cmc ?? card.cmc),
          power: parseNumericValue(source.power ?? card.power),
          toughness: parseNumericValue(source.toughness ?? card.toughness),
          loyalty: parseNumericValue(source.loyalty ?? card.loyalty),
          rarity: safeLower((source.rarity ?? card.rarity) || ''),
          oracleTokens: mergedOracleTokens,
          textBigrams,
          keywordTokens: mergedKeywordList,
          roleSignals,
          phaseSignals,
          abilityIntents,
          eventSignatures,
          causalSignatures,
          primaryMechanics,
          primaryMechanicScores,
          primaryMechanicBuckets,
          semanticSignalConfidence,
          keywordSet,
          oracleSet,
          hasDoubleFace: hasSecondaryFace,
          hasFlying: keywordSet.has('flying'),
          hasFlash: keywordSet.has('flash'),
          hasLifelink: keywordSet.has('lifelink'),
          layout: safeLower(source.layout || card.layout || ''),
          typeLine: source.type_line || card.type_line || '',
          set: card.set,
          oracleText,
          sourceImage: source.image_uris || card.image_uris || {},
          specialRules: uniqueValues(source.special_rules || card.special_rules || []),
        };

        cardProfileCache.set(profileKey, makeProfileCacheEntry(profile));
        return profile;
      }

      function mergeAbilityIntents(primary = [], secondary = [], secondaryWeight = 0.45) {
        const merged = [...primary];
        const index = new Map();
        primary.forEach((intent) => {
          const intentId = safeLower(intent?.id);
          if (!intentId) return;
          index.set(intentId, intent);
        });
        secondary.forEach((intent) => {
          const intentId = safeLower(intent?.id);
          if (!intentId) return;
          const current = index.get(intentId);
          if (!current) {
            merged.push({
              ...intent,
              confidence: clamp(Number(intent.confidence || 0) * secondaryWeight),
            });
            return;
          }

          const mergedConfidence = clamp(
            clamp(Number(current.confidence || 0)) + clamp(Number(intent.confidence || 0)) * secondaryWeight
          );
          current.confidence = mergedConfidence;
          index.set(intentId, current);
        });

        const mergedMap = new Map();
        merged.forEach((intent) => {
          const intentId = safeLower(intent?.id);
          if (!intentId) return;
          const existing = mergedMap.get(intentId);
          if (!existing || Number(intent.confidence || 0) > Number(existing.confidence || 0)) {
            mergedMap.set(intentId, intent);
          }
        });

        return Array.from(mergedMap.values()).sort(
          (left, right) => (Number(right.weight || 0) + Number(right.confidence || 0)) - (Number(left.weight || 0) + Number(left.confidence || 0))
        );
      }

      function extractAbilityEventSignatures(oracleText = '') {
        const normalized = normalizeIntentText(oracleText);
        if (!normalized) return [];

        const cached = EVENT_SIGNATURE_CACHE.get(normalized);
        if (cached && Date.now() - cached.ts <= EVENT_SIGNATURE_TTL_MS) {
          return cached.value;
        }
        if (cached && Date.now() - cached.ts > EVENT_SIGNATURE_TTL_MS) {
          EVENT_SIGNATURE_CACHE.delete(normalized);
        }

        const sentences = splitOracleSentences(normalized);
        const signatures = [];
        const canonicalCandidates = sentences.flatMap((sentence) => buildCanonicalEventSignalsFromSentence(sentence));
        canonicalCandidates.forEach((signature) => {
          const id = normalizeMechanicSignalId(signature?.id);
          if (!id) return;
          const current = signatures.find((entry) => safeLower(entry.id) === id);
          if (!current) {
            signatures.push({ ...signature, id });
            return;
          }

          const mergedConfidence = clamp(
            clamp(Number(current.confidence || 0)) + clamp(Number(signature.confidence || 0) * 0.75)
          );
          current.confidence = Math.max(current.confidence || 0, mergedConfidence);
          current.weight = Math.max(current.weight || 0, Number(signature.weight) || 0);
          current.scoreWeight = Math.max(current.scoreWeight || 0, Number(signature.scoreWeight) || 0);
        });

        for (const rule of EVENT_SIGNATURE_RULES) {
          const evidenceMatches = sentences.filter((sentence) => {
            if (typeof rule.test === 'function') {
              return rule.test(sentence);
            }
            if (Array.isArray(rule.patterns)) {
              return rule.patterns.some((pattern) => {
                if (pattern instanceof RegExp) return pattern.test(sentence);
                return safeLower(sentence).includes(safeLower(pattern));
              });
            }
            return false;
          });
          if (!evidenceMatches.length) continue;

          const scoreEvidence = evidenceMatches.length;
          const confidence = clamp(0.45 + 0.18 * Math.min(2, scoreEvidence), 0, 1);
          signatures.push({
            id: normalizeMechanicSignalId(rule.id),
            label: rule.label,
            weight: Number(rule.weight) || 1,
            confidence,
            scoreWeight: Number(rule.scoreWeight || 1),
          });
        }

        const signatureMap = new Map();
        signatures.forEach((signature) => {
          const id = safeLower(signature.id);
          if (!id) return;
          const existing = signatureMap.get(id);
          if (!existing) {
            signatureMap.set(id, { ...signature, id, confidence: clamp(Number(signature.confidence || 0)) });
            return;
          }
          existing.confidence = clamp((Number(existing.confidence || 0) + Number(signature.confidence || 0)) / 2);
          existing.weight = Math.max(existing.weight || 0, Number(signature.weight || 0));
          existing.scoreWeight = Math.max(existing.scoreWeight || 0, Number(signature.scoreWeight || 0));
        });

        const merged = Array.from(signatureMap.values()).sort(
          (left, right) => right.weight * right.confidence * (right.scoreWeight || 1) - left.weight * left.confidence * (left.scoreWeight || 1)
        );

        EVENT_SIGNATURE_CACHE.set(normalized, { ts: Date.now(), value: merged });
        return merged;
      }

      function mergeEventSignatures(primary = [], secondary = [], secondaryWeight = 0.45) {
        const merged = [...primary];
        const index = new Map();
        primary.forEach((signature) => {
          const normalizedId = normalizeMechanicSignalId(signature?.id);
          if (!normalizedId) return;
          index.set(normalizedId, signature);
        });

        secondary.forEach((signature) => {
          const normalizedSignatureId = normalizeMechanicSignalId(signature?.id);
          if (!normalizedSignatureId) return;
          const current = index.get(normalizedSignatureId);
          if (!current) {
            merged.push({ ...signature, id: normalizedSignatureId, confidence: clamp(Number(signature.confidence || 0) * secondaryWeight) });
            return;
          }
          const mergedConfidence = clamp(Number(current.confidence || 0) + Number(signature.confidence || 0) * secondaryWeight);
          current.confidence = mergedConfidence;
          index.set(normalizedSignatureId, current);
        });

        const mergedMap = new Map();
        merged.forEach((signature) => {
          const existing = mergedMap.get(signature.id);
          if (!existing || Number(signature.confidence || 0) > Number(existing.confidence || 0)) {
            mergedMap.set(signature.id, signature);
          }
        });

        return Array.from(mergedMap.values()).sort(
          (left, right) => right.weight * right.scoreWeight * (right.confidence || 0) -
            left.weight * left.scoreWeight * (left.confidence || 0)
        );
      }

      function getSharedEventSignatures(seed = {}, candidate = {}) {
        const seedSignatures =
          Array.isArray(seed?.eventSignatures) && seed.eventSignatures.length
            ? seed.eventSignatures
            : extractAbilityEventSignatures(seed.oracle_text || seed.oracleText || seed.cardText || '');
        const candidateSignatures =
          Array.isArray(candidate?.eventSignatures) && candidate.eventSignatures.length
            ? candidate.eventSignatures
            : extractAbilityEventSignatures(candidate.oracle_text || candidate.oracleText || candidate.cardText || '');

        const candidateMap = buildSignatureIdLookup(candidateSignatures);
        return seedSignatures
          .filter((signature) => candidateMap.has(signature.id))
          .map((signature) => ({
            ...signature,
            candidateConfidence: candidateMap.get(signature.id)?.confidence || 0,
            _signatureType: safeLower(signature.id) === safeLower(candidateMap.get(signature.id)?.id || signature.id)
              ? 'direct'
              : 'family',
          }))
          .sort((left, right) => {
            const leftPenalty = Number(left._signatureType === 'family');
            const rightPenalty = Number(right._signatureType === 'family');
            if (leftPenalty !== rightPenalty) return leftPenalty - rightPenalty;
            return (right.weight || 0) - (left.weight || 0);
          });
      }

      function getSharedCausalSignatures(seed = {}, candidate = {}) {
        const seedSignatures = new Set(
          (Array.isArray(seed?.causalSignatures) ? seed.causalSignatures : []).map((entry) => safeLower(entry || ''))
        );
        const candidateSignatures = new Set(
          (Array.isArray(candidate?.causalSignatures) ? candidate.causalSignatures : []).map((entry) => safeLower(entry || ''))
        );
        const shared = [];
        seedSignatures.forEach((signature) => {
          if (candidateSignatures.has(signature)) {
            shared.push(signature);
          }
        });
        return uniqueValues(shared).slice(0, 6);
      }

      function getEventSignatureFamily(signatureId) {
        const normalized = safeLower(signatureId);
        return EVENT_SIGNATURE_FAMILY_MAP[normalized] || [];
      }

      function buildSignatureIdLookup(signatures = []) {
        const lookup = new Map();
        const entries = Array.isArray(signatures) ? signatures : [];

        entries.forEach((entry) => {
          const signature = { ...(entry || {}) };
          const normalizedId = safeLower(signature.id);
          if (!normalizedId) return;

          const current = lookup.get(normalizedId);
          if (!current || Number(signature.confidence || 0) > Number(current.confidence || 0)) {
            lookup.set(normalizedId, signature);
          }

          getEventSignatureFamily(normalizedId).forEach((relatedId) => {
            const normalizedRelated = safeLower(relatedId);
            if (!normalizedRelated || lookup.has(normalizedRelated)) return;
            lookup.set(normalizedRelated, {
              ...signature,
              id: normalizedRelated,
              _inheritedFrom: normalizedId,
              _signatureType: 'family',
            });
          });
        });

        return lookup;
      }

      function buildEventSignatureLookupSet(signatures = []) {
        const lookup = new Set();
        const entries = Array.isArray(signatures) ? signatures : [];
        entries.forEach((entry) => {
          const id = safeLower(entry?.id || '');
          if (!id) return;
          lookup.add(id);
          getEventSignatureFamily(id).forEach((relatedId) => {
            const normalized = safeLower(relatedId);
            if (normalized) lookup.add(normalized);
          });
        });
        return lookup;
      }

      function scoreByEventSignature(seed = {}, candidate = {}) {
        const seedSignatures =
          Array.isArray(seed?.eventSignatures) && seed.eventSignatures.length
            ? seed.eventSignatures
            : extractAbilityEventSignatures(seed.oracle_text || seed.oracleText || seed.cardText || '');
        const candidateSignatures =
          Array.isArray(candidate?.eventSignatures) && candidate.eventSignatures.length
            ? candidate.eventSignatures
            : extractAbilityEventSignatures(candidate.oracle_text || candidate.oracleText || candidate.cardText || '');

        if (!seedSignatures.length || !candidateSignatures.length) {
          return { score: 0, reasons: [] };
        }

        const seedMap = buildSignatureIdLookup(seedSignatures);
        const candidateMap = buildSignatureIdLookup(candidateSignatures);
        const sharedSignatures = [];
        const allIds = new Set([...seedMap.keys(), ...candidateMap.keys()]);

        let intersection = 0;
        let union = 0;
        let directOverlap = 0;
        let familyOnlyOverlap = 0;
        allIds.forEach((id) => {
          const left = seedMap.get(id);
          const right = candidateMap.get(id);
          const leftType = left?._signatureType || 'direct';
          const rightType = right?._signatureType || 'direct';
          const leftScore = Number((left?.weight || 0) * (left?.confidence || 0) * (left?.scoreWeight || 1));
          const rightScore = Number((right?.weight || 0) * (right?.confidence || 0) * (right?.scoreWeight || 1));

          if (left && right) {
            const intersectionPenalty = leftType === 'family' || rightType === 'family' ? 0.82 : 1;
            intersection += Math.min(leftScore, rightScore) * intersectionPenalty;
            const overlap = Math.min(Math.max(leftScore, 0), Math.max(rightScore, 0));
            const averageConfidence = overlap > 0 ? (Number(left.confidence || 0) + Number(right.confidence || 0)) / 2 : 0;
            if (left && right) {
              sharedSignatures.push({
                id,
                label: left.label || right.label || id,
                confidence: averageConfidence,
                weight: (left.weight || 0) * 0.85 + (right.weight || 0) * 0.15,
                family: leftType === 'family' || rightType === 'family',
              });
            }
            if (leftType === 'family' || rightType === 'family') {
              familyOnlyOverlap += 1;
            } else {
              directOverlap += 1;
            }
          }
          union += Math.max(leftScore, rightScore);
        });

        let score = union > 0 ? clamp(intersection / union) : 0;
        if (directOverlap === 0 && familyOnlyOverlap > 0 && score > 0) {
          score = clamp(score * 0.75);
        }
        const reasons = sharedSignatures
          .sort((left, right) => (right.weight || 0) - (left.weight || 0))
          .slice(0, 2)
          .map((signature) => `assinatura causal${signature.family ? ' associada' : ''}: ${signature.label}`);
        if (!directOverlap && familyOnlyOverlap && reasons.length) {
          reasons.push('causalidade relacionada por família sem casamento direto');
        }
        return { score, reasons };
      }

      function buildNameExclusion(profile) {
        if (!profile.name) return '';
        return `-name:${quoteForQuery(profile.name)}`;
      }

      function quoteForQuery(value) {
        const escaped = String(value ?? '')
          .replace(/\\/g, '\\\\')
          .replace(/"/g, '\\"')
          .replace(/\{/g, '\\{')
          .replace(/\}/g, '\\}');
        return `"${escaped}"`;
      }

      function normalizeQuery(value) {
        return String(value ?? '')
          .replace(/\s+/g, ' ')
          .replace(/\s*([()+-])\s*/g, '$1')
          .trim()
          .toLowerCase();
      }

      function buildProfileCacheKey(card, faceIndex = 0) {
        const key = safeLower(card?.id || card?.oracle_id || card?.name || '');
        return `${key}|${normalizeFaceIndex(card, faceIndex)}`;
      }

      function makeProfileCacheEntry(value) {
        return { ts: Date.now(), value };
      }

      function getQueryCacheKey(query) {
        return normalizeQuery(query);
      }

      function getCachedQueryResult(query) {
        const key = getQueryCacheKey(query);
        const cached = queryCache.get(key);
        if (!cached) return null;
        if (Date.now() - cached.ts > QUERY_CACHE_TTL_MS) {
          queryCache.delete(key);
          return null;
        }
        return cached.value;
      }

      function setCachedQueryResult(query, cards) {
        const key = getQueryCacheKey(query);
        queryCache.set(key, {
          ts: Date.now(),
          value: cards,
        });
      }

      function joinQueryClauses(...clauses) {
        return clauses.filter(Boolean).map((value) => String(value).trim()).filter(Boolean).join(' ');
      }

      function buildTypeClause(profile) {
        const mainType = profile.mainType || (profile.familyTypes && profile.familyTypes[0]) || '';
        if (!mainType) return '';
        return `type:${quoteForQuery(mainType)}`;
      }

      function buildColorClause(profile) {
        if (!Array.isArray(profile.colors) || profile.colors.length === 0) return '';
        if (profile.colors.length === 1) return `c:${profile.colors[0]}`;
        return `(${profile.colors.map((color) => `c:${color}`).join(' OR ')})`;
      }

      function buildCmcClause(base, spread) {
        if (!Number.isFinite(base)) return '';
        const min = Math.max(0, Math.floor(base - spread));
        const max = Math.floor(base + spread);
        if (min === max) return `cmc=${min}`;
        return `cmc>=${min} cmc<=${max}`;
      }

      function buildKeywordClause(profile, maxTerms = 3) {
        const terms = uniqueValues(profile.keywordTokens || [])
          .filter((term) => term.length > 2)
          .sort()
          .slice(0, maxTerms);
        if (!terms.length) return '';
        return `(${terms.map((term) => `o:${quoteForQuery(term)}`).join(' OR ')})`;
      }

      function buildEventSignatureClause(profile, maxTerms = 2, queryTermLimit = 4) {
        const signatures = uniqueValues((profile?.eventSignatures || []).map((entry) => entry.id || '').filter(Boolean));
        const terms = [];

        signatures.forEach((signatureId) => {
          if (terms.length >= maxTerms) return;
          const ruleTerms = EVENT_SIGNATURE_QUERY_TERMS[safeLower(signatureId)] || [];
          terms.push(...ruleTerms);
        });

        if (!terms.length) return '';
        return bucketTokensToOracleClause(terms, queryTermLimit);
      }

      function buildTopEventSignatureClause(profile, maxTerms = 2, queryTermLimit = 8) {
        const signatures = Array.isArray(profile?.eventSignatures) ? profile.eventSignatures : [];
        const ordered = signatures
          .map((entry) => ({
            id: safeLower(entry?.id || ''),
            queryTerms: EVENT_SIGNATURE_QUERY_TERMS[safeLower(entry?.id || '')] || [],
            confidence: Number(entry?.confidence || 0),
            weight: Number(entry?.weight || 0),
            scoreWeight: Number(entry?.scoreWeight || 1),
          }))
          .filter((entry) => entry.id && entry.queryTerms.length)
          .sort((left, right) => right.confidence * right.weight * (right.scoreWeight || 1) - left.confidence * left.weight * (left.scoreWeight || 1));

        const terms = ordered
          .slice(0, Math.max(1, maxTerms))
          .flatMap((entry) => entry.queryTerms)
          .filter(Boolean);

        if (!terms.length) {
          const oracleFallback = buildOracleFallbackClause(profile, 3);
          return oracleFallback;
        }

        return bucketTokensToOracleClause(terms, queryTermLimit);
      }

      function splitOracleTermToQueries(term = '') {
        const normalized = safeLower(term || '').trim();
        if (!normalized) return [];
        if (!/\s/.test(normalized)) {
          return [`o:${quoteForQuery(normalized)}`];
        }

        const tokens = normalized
          .replace(/["'`]+/g, ' ')
          .replace(/[^a-z0-9\s]/g, ' ')
          .split(/\s+/)
          .map((value) => value.trim())
          .filter((value) => value.length > 2 && value.length < 20)
          .slice(0, 3);

        if (tokens.length >= 3) {
          const semanticSignals = tokens.slice(0, 3);
          return semanticSignals.map((value) => `o:${quoteForQuery(value)}`);
        }

        return [`o:${quoteForQuery(normalized)}`];
      }

      function bucketTokensToOracleClause(terms = [], maxTerms = 3) {
        const safeTerms = uniqueValues(terms)
          .map((term) => safeLower(term).trim())
          .filter(Boolean)
          .slice(0, maxTerms);
        if (!safeTerms.length) return '';
        const queryParts = safeTerms.flatMap((term) => splitOracleTermToQueries(term)).slice(0, 12);
        if (!queryParts.length) return '';
        return `(${queryParts.join(' OR ')})`;
      }

      function buildIntentClause(profile, maxTerms = 2) {
        const terms = (profile.abilityIntents || [])
          .slice()
          .sort((left, right) => (Number(right.weight || 0) * Number(right.confidence || 0)) - (Number(left.weight || 0) * Number(left.confidence || 0)))
          .slice(0, maxTerms * 3)
          .flatMap((intent) => intent.queryTerms || [])
          .filter(Boolean)
          .slice(0, maxTerms);

        const signatureTerms = (profile.eventSignatures || [])
          .slice()
          .flatMap((signature) => EVENT_SIGNATURE_QUERY_TERMS[safeLower(signature.id)] || [])
          .filter(Boolean)
          .slice(0, maxTerms);
        const fallback = ['creature', 'life', 'sacrifice', 'draw', 'destroy'];
        const finalTerms = terms.length ? terms : signatureTerms.length ? signatureTerms : fallback;
        return `(${uniqueValues(finalTerms).map((term) => `o:${quoteForQuery(term)}`).join(' OR ')})`;
      }

      function buildPrimaryMechanicClause(profile, maxTerms = 1) {
        const mechanics = uniqueValues(profile?.primaryMechanics || []);
        const terms = [];
        mechanics.forEach((mechanicId) => {
          if (terms.length >= maxTerms) return;
          const options = getPrimaryMechanicQueryTerms(mechanicId);
          terms.push(...options);
        });

        if (!terms.length) {
          return buildIntentClause(profile, maxTerms);
        }

        return bucketTokensToOracleClause(terms, maxTerms);
      }

      function buildPrimaryMechanicExactClause(profile, maxTerms = 2) {
        const topMechanics = uniqueValues(profile?.primaryMechanics || []).slice(0, Math.max(1, maxTerms));
        const requiredTerms = [];

        topMechanics.forEach((mechanicId) => {
          const coreSignatures = getPrimaryMechanicCoreSignatures(mechanicId);
          const mechanicTerms = [
            ...getPrimaryMechanicQueryTerms(mechanicId),
            ...getPrimaryMechanicTextSignalSet(mechanicId),
            ...coreSignatures.flatMap((signatureId) => getPrimaryMechanicTextSignalSet(signatureId)),
          ];
          requiredTerms.push(...mechanicTerms);
        });

        const fallbackTerms = topMechanics.flatMap((mechanicId) => getPrimaryMechanicQueryTerms(mechanicId));
        const finalTerms = uniqueValues((requiredTerms.length ? requiredTerms : fallbackTerms).filter(Boolean)).slice(0, 4);
        if (!finalTerms.length) return '';

        // Usa AND explícito entre cláusulas para evitar “match” sem relação mecânica real.
        return finalTerms.map((term) => `o:${quoteForQuery(term)}`).join(' ');
      }

      function buildPrimaryMechanicTextClause(profile, maxTerms = 2) {
        const topMechanics = uniqueValues(profile?.primaryMechanics || []).slice(0, Math.max(1, maxTerms));
        const normalizedText = safeLower(profile?.oracleText || '');
        if (!topMechanics.length || !normalizedText) return '';

        const terms = [];
        topMechanics.forEach((mechanic) => {
          const topMechanicLower = safeLower(mechanic);
          const hasLifeDrainAnchor =
            hasLifeDrainExchangePattern(normalizedText) ||
            hasPairedLifeTransferPattern(normalizedText) ||
            (hasAnyToken(normalizedText, ['target opponent loses life', 'you gain life', 'creature dies']) &&
              topMechanicLower.includes('death'));
          const hasCombatAnchor = ['combat_transfer', 'sig_combat_involvement'].includes(topMechanicLower) ||
            hasAnyToken(normalizedText, ['combat damage', 'combat damage to', 'at end of combat']);
          const hasCounterAnchor = topMechanicLower.includes('counter') || topMechanicLower.includes('remove');
          const hasSacrificeAnchor = topMechanicLower.includes('sacrifice') || topMechanicLower.includes('sacrifice_value');
          const hasDrawAnchor = topMechanicLower.includes('draw') || topMechanicLower.includes('discard');

          if (hasLifeDrainAnchor) {
            terms.push('target opponent loses life');
            terms.push('you gain life');
            terms.push('creature dies');
          }

          if (hasCombatAnchor) {
            terms.push('combat damage');
            terms.push('attacks');
            terms.push('deals damage');
          }

          if (hasCounterAnchor) {
            terms.push('counterspell');
            terms.push('destroy');
            terms.push('remove');
          }

          if (hasSacrificeAnchor) {
            terms.push('sacrifice');
            terms.push('sacrifice a creature');
            terms.push('sacrifice this creature');
          }

          if (hasDrawAnchor) {
            terms.push('draw');
            terms.push('discard');
            terms.push('search your');
          }

          terms.push(...getPrimaryMechanicQueryTerms(mechanic));
          terms.push(...getPrimaryMechanicTextSignalSet(mechanic));
          terms.push(...getPrimaryMechanicCoreSignatures(mechanic).flatMap((signatureId) => getPrimaryMechanicTextSignalSet(signatureId)));
        });

        const fallbackTerms = topMechanics.flatMap((mechanic) => getPrimaryMechanicQueryTerms(mechanic));
        if (!terms.length && fallbackTerms.length) {
          terms.push(...fallbackTerms);
        }

        return terms.length ? bucketTokensToOracleClause(terms, maxTerms * 3) : '';
      }

      function buildPrimaryMechanicEventClause(profile, maxTerms = 2, queryTermLimit = 10) {
        const topMechanics = uniqueValues(profile?.primaryMechanics || []).slice(0, Math.max(1, maxTerms));
        if (!topMechanics.length) return '';

        const terms = [];
        topMechanics.forEach((topMechanic) => {
          const signatureSignals = getPrimaryMechanicTextSignalSet(topMechanic);
          signatureSignals.forEach((signatureId) => {
            terms.push(...(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signatureId)] || []));
          });
          const coreSignatures = getPrimaryMechanicCoreSignatures(topMechanic);
          coreSignatures.forEach((signatureId) => {
            terms.push(...(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signatureId)] || []));
          });
          terms.push(...getPrimaryMechanicQueryTerms(topMechanic));
          terms.push(...getPrimaryMechanicQueryTerms(topMechanic.replace(/^sig_/, '')));
        });

        if (!terms.length) return '';
        return bucketTokensToOracleClause(terms, queryTermLimit);
      }

      function buildPrimaryMechanicCausalClause(profile, maxTerms = 2, queryTermLimit = 8) {
        const terms = [];
        const directCausal = uniqueValues((profile?.causalSignatures || []).filter(Boolean));
        directCausal.forEach((signatureId) => {
          terms.push(...(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signatureId)] || []));
        });

        const topMechanics = uniqueValues(profile?.primaryMechanics || []).slice(0, Math.max(1, maxTerms));
        topMechanics.forEach((mechanicId) => {
          const coreSignatures = getPrimaryMechanicCoreSignatures(mechanicId);
          coreSignatures.forEach((signatureId) => {
            terms.push(...(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signatureId)] || []));
          });
          const textSignals = getPrimaryMechanicTextSignalSet(mechanicId);
          textSignals.forEach((signalId) => {
            terms.push(...(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signalId)] || []));
          });
        });

        if (!terms.length) {
          terms.push('creature dies', 'target opponent loses life', 'you gain life');
        }

        return bucketTokensToOracleClause(terms, queryTermLimit);
      }

      function buildPrimaryMechanicRecallClause(profile, maxTerms = 3, queryTermLimit = 10) {
        const topMechanics = uniqueValues(profile?.primaryMechanics || []).slice(0, Math.max(1, maxTerms));
        const topMechanicSignals = topMechanics.flatMap((mechanic) => getPrimaryMechanicTextSignalSet(mechanic));
        const topMechanicCoreSignatures = topMechanics.flatMap((mechanic) => getPrimaryMechanicCoreSignatures(mechanic));
        const terms = [];

        topMechanics.forEach((mechanic) => {
          terms.push(...getPrimaryMechanicQueryTerms(mechanic));
          terms.push(...getPrimaryMechanicQueryTerms(mechanic.replace(/^sig_/, '')));
        });

        topMechanicSignals.forEach((signalId) => {
          terms.push(...(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signalId)] || []));
        });
        topMechanicCoreSignatures.forEach((signatureId) => {
          terms.push(...(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signatureId)] || []));
        });

        const seedSignals = (profile?.abilityIntents || [])
          .slice()
          .sort((left, right) => (Number(right.weight || 0) * Number(right.confidence || 0)) - (Number(left.weight || 0) * Number(left.confidence || 0)))
          .slice(0, PRIMARY_MECHANIC_RECALL_LIMIT)
          .flatMap((intent) => intent?.queryTerms || []);

        terms.push(...seedSignals);

        const fallbackTerms = topMechanics.flatMap((mechanic) => getPrimaryMechanicTextSignalSet(mechanic))
          .flatMap((signalId) => getPrimaryMechanicQueryTerms(signalId))
          .filter(Boolean);

        const finalTerms = uniqueValues(terms.length ? terms : fallbackTerms).filter(Boolean);
        if (!finalTerms.length) return '';

        return bucketTokensToOracleClause(finalTerms, queryTermLimit);
      }

      function buildPrimaryMechanicDirectClause(profile, maxTerms = 2, queryTermLimit = 5) {
        const mechanics = uniqueValues(profile?.primaryMechanics || []);
        const terms = [];
        for (const mechanicId of mechanics) {
          if (terms.length >= maxTerms) break;
          const directTerms = getPrimaryMechanicQueryTerms(mechanicId);
          terms.push(...directTerms);
        }
        return terms.length ? bucketTokensToOracleClause(terms, queryTermLimit) : '';
      }

      function buildPrimaryMechanicAnchorClause(profile, maxTerms = 2, queryTermLimit = 8) {
        const topMechanics = uniqueValues(profile?.primaryMechanics || []).slice(0, Math.max(1, maxTerms));
        const terms = [];
        if (!topMechanics.length) return '';

        topMechanics.forEach((topMechanic) => {
          terms.push(...getPrimaryMechanicQueryTerms(topMechanic));
          terms.push(...getPrimaryMechanicQueryTerms(topMechanic.replace(/^sig_/, '')));

          getPrimaryMechanicAnchorSignals(topMechanic).forEach((signal) => {
            if (!signal) return;
            terms.push(...(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signal)] || []));
          });

          getPrimaryMechanicCoreSignatures(topMechanic).forEach((signatureId) => {
            terms.push(...(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signatureId)] || []));
          });
        });

        const coreTerms = uniqueValues(terms).filter(Boolean).slice(0, maxTerms);

        return coreTerms.length ? bucketTokensToOracleClause(coreTerms, queryTermLimit) : '';
      }

      function buildPrimaryMechanicBridgeClause(profile, maxTerms = 2, queryTermLimit = 8) {
        const mechanics = uniqueValues(profile?.primaryMechanics || []);
        const bridgeSignals = [];
        mechanics.forEach((mechanicId) => {
          const bridge = getPrimaryMechanicAnchorSignals(mechanicId);
          if (!bridge.length) return;
          bridgeSignals.push(...bridge);
        });

        if (!bridgeSignals.length) return '';

        const terms = [];
        bridgeSignals.forEach((bridgeId) => {
          if (terms.length >= maxTerms) return;
          const directTerms = EVENT_SIGNATURE_QUERY_TERMS[safeLower(bridgeId)] || [];
          terms.push(...directTerms);
        });

        return terms.length ? bucketTokensToOracleClause(terms, queryTermLimit) : '';
      }

      function buildRoleClause(profile, maxTerms = 2) {
        const terms = ROLE_KEYWORDS_ORDER.filter((role) => Number(profile?.roleSignals?.[role] || 0) > 0)
          .sort((a, b) => (profile.roleSignals[b] || 0) - (profile.roleSignals[a] || 0))
          .slice(0, maxTerms);
        if (!terms.length) return '';
        return `(${terms.map((term) => `o:${quoteForQuery(term)}`).join(' OR ')})`;
      }

      function buildOracleFallbackClause(profile, maxTerms = 3) {
        const terms = uniqueValues(profile.oracleTokens || []).filter((term) => term.length > 4).slice(0, maxTerms);
        if (!terms.length) return '';
        return `(${terms.map((term) => `o:${quoteForQuery(term)}`).join(' OR ')})`;
      }

      function collectCandidates(seedProfile, options = {}) {
        const {
          maxStage = 4,
          state = null,
          minPool = CANDIDATE_MIN_POOL,
          queryLimit = MAX_CANDIDATE_FETCH_QUERIES,
          perQueryLimit = SIMILAR_CANDIDATE_FETCH_LIMIT,
        } = options || {};

        const safeState = state || {};
        const candidateMap =
          safeState.candidateMap instanceof Map ? safeState.candidateMap : new Map();
        const candidateMeta =
          safeState.candidateMeta instanceof Map ? safeState.candidateMeta : new Map();
        const queryHistory =
          safeState.queryHistory instanceof Set ? safeState.queryHistory : new Set();

        const maxStageToRun = Math.max(1, Math.min(4, Number(maxStage) || 4));
        const stageLimit = Math.max(1, Math.min(4, maxStageToRun));
        const primaryMechanicAnchorCount = uniqueValues(seedProfile?.primaryMechanics || []).length;
        const anchorStrengthTop = getPrimaryMechanicScore(seedProfile, uniqueValues(seedProfile?.primaryMechanics || [])[0] || '');
        const strictCandidateTarget = Math.max(
          anchorStrengthTop >= PRIMARY_MECHANIC_HARD_ANCHOR_MIN ? 8 : PRIMARY_MECHANIC_STAGE2_MIN_UTILITY,
          SIMILARITY_REQUIRED_TOP * 2
        );
        const needsMechanicRecallFallback = primaryMechanicAnchorCount > 0;

        const queries = [];
        const seenQueries = new Set();

        const addQuery = (query, stage) => {
          if (!query) return;
          const key = query.toLowerCase().trim();
          if (!seenQueries.has(key)) {
            seenQueries.add(key);
            queries.push({ query, stage });
          }
        };

        const typeClause = buildTypeClause(seedProfile);
        const colorClause = buildColorClause(seedProfile);
        const cmcClausePrimary = buildCmcClause(seedProfile.cmc, CMC_SPREAD_PRIMARY);
        const cmcClauseSecondary = buildCmcClause(seedProfile.cmc, CMC_SPREAD_SECONDARY);
        const cmcClauseFallback = buildCmcClause(seedProfile.cmc, CMC_SPREAD_FALLBACK);
        const roleClause = buildRoleClause(seedProfile, 3);
        const roleClauseStrong = buildRoleClause(seedProfile, 2);
        const intentClause = buildIntentClause(seedProfile, CANDIDATE_STAGE3_TERM_LIMIT + 1);
        const intentClauseCore = buildIntentClause(seedProfile, 2);
        const primaryMechanicClause = buildPrimaryMechanicClause(seedProfile, 3);
        const primaryMechanicExactClause = buildPrimaryMechanicExactClause(seedProfile, 2);
        const primaryMechanicDirectClause = buildPrimaryMechanicDirectClause(seedProfile, 2, 8);
        const primaryMechanicAnchorClause = buildPrimaryMechanicAnchorClause(seedProfile, 2, 8);
        const primaryMechanicBridgeClause = buildPrimaryMechanicBridgeClause(seedProfile, 2, 6);
        const eventSignatureClause = buildEventSignatureClause(seedProfile, 4, CANDIDATE_STAGE3_TERM_LIMIT * 2 + 2);
        const eventSignatureClauseStrong = buildEventSignatureClause(seedProfile, 3, 6);
        const eventSignatureClauseFallback = buildEventSignatureClause(seedProfile, 6, 10);
        const primaryEventClause = buildTopEventSignatureClause(seedProfile, 2, 8);
        const primaryEventClauseBroad = buildTopEventSignatureClause(seedProfile, 4, 10);
        const primaryMechanicTextClause = buildPrimaryMechanicTextClause(seedProfile, 2);
        const primaryMechanicEventClause = buildPrimaryMechanicEventClause(seedProfile, 3, 12);
        const primaryMechanicCausalClause = buildPrimaryMechanicCausalClause(seedProfile, 2, 8);
        const primaryMechanicRecallClause = buildPrimaryMechanicRecallClause(seedProfile, 3, 12);
        const oracleFallbackClause = buildOracleFallbackClause(seedProfile, 4);
        const nameExclusion = buildNameExclusion(seedProfile);

        addQuery(
          joinQueryClauses(typeClause, colorClause, cmcClausePrimary, primaryMechanicExactClause, nameExclusion),
          1
        ); // S1 (âncora mecânica principal estrita)
        addQuery(
          joinQueryClauses(typeClause, colorClause, cmcClausePrimary, primaryMechanicRecallClause, primaryMechanicTextClause, primaryMechanicEventClause, nameExclusion),
          1
        ); // S1 (mecânica principal + causalidade forte)
        addQuery(
          joinQueryClauses(typeClause, cmcClausePrimary, primaryMechanicClause, primaryMechanicAnchorClause, primaryMechanicTextClause, nameExclusion),
          1
        ); // S1 (mecânica principal por âncoras explícitas de assinatura)
        addQuery(
          joinQueryClauses(typeClause, cmcClausePrimary, primaryMechanicCausalClause, primaryMechanicEventClause, primaryMechanicDirectClause, eventSignatureClauseStrong, nameExclusion),
          1
        ); // S1 (sem cor, foco mecânico+causalidade)
        addQuery(
          joinQueryClauses(typeClause, primaryMechanicRecallClause, primaryMechanicDirectClause, primaryEventClause, primaryMechanicTextClause, nameExclusion),
          1
        ); // S1 (sem custo, foco causal textual mecânico)
        addQuery(
          joinQueryClauses(typeClause, colorClause, cmcClausePrimary, roleClauseStrong, primaryMechanicRecallClause, eventSignatureClauseStrong, primaryMechanicTextClause, nameExclusion),
          2
        ); // S2 (papel + assinatura causal forte)
        addQuery(
          joinQueryClauses(typeClause, cmcClauseSecondary, roleClauseStrong, primaryMechanicRecallClause, nameExclusion),
          2
        ); // S2 (função + causalidade + custo)
        addQuery(
          joinQueryClauses(typeClause, cmcClauseSecondary, roleClause, intentClauseCore, primaryEventClauseBroad, primaryMechanicBridgeClause, eventSignatureClause, primaryMechanicRecallClause, nameExclusion),
          3
        ); // S3 (custo + função + intenção)
        addQuery(
          joinQueryClauses(typeClause, cmcClauseFallback, intentClause, primaryEventClauseBroad, primaryMechanicBridgeClause, primaryMechanicRecallClause, eventSignatureClauseFallback, nameExclusion),
          3
        ); // S3 (fallback por custo amplo)
        addQuery(
          joinQueryClauses(typeClause, cmcClauseFallback, primaryMechanicRecallClause, eventSignatureClause, primaryMechanicTextClause, oracleFallbackClause, nameExclusion),
          4
        ); // S4 (reserva causal+lexical)

        const stages = {
          1: [],
          2: [],
          3: [],
          4: [],
        };
        queries.forEach((entry) => {
          if (entry.stage >= 1 && entry.stage <= 4) stages[entry.stage].push(entry.query);
        });

        const candidateKey = (card) => card?.oracle_id || card?.id;
        const dedupeCard = (card, stage = 4, query = '') => {
          if (!card) return;
          if (!card.name || !card.name.trim()) return;
          const key = candidateKey(card);
          if (!key || key === seedProfile.oracleId || key === seedProfile.id) return;
          if (safeLower(card.name) === safeLower(seedProfile.name)) return;
          candidateMap.set(key, card);

          const current = candidateMeta.get(key);
          const currentStage = Number(current?.stage || 5);
          if (!current || stage < currentStage) {
            candidateMeta.set(key, {
              stage,
              query,
            });
          }
        };

        const runQuery = async (query, stage = 4) => {
          const normalizedQuery = getQueryCacheKey(query);
          if (!normalizedQuery || queryHistory.has(normalizedQuery) || queryHistory.size >= queryLimit) return [];
          queryHistory.add(normalizedQuery);
          const cards = await searchCardsByQuery(query, perQueryLimit);
          cards.forEach((card) => dedupeCard(card, stage, query));
          return cards;
        };

        const stagesByOrder = [1, 2, 3, 4];
        const runStage = async (stage, maxPerStage = 1, offset = 0) => {
          if (queryHistory.size >= queryLimit) return [];
          const stageQueries = stages[stage] || [];
          const candidateQueries = stageQueries.slice(offset, offset + maxPerStage);
          const queuedQueries = candidateQueries.filter((query) => {
            const normalized = getQueryCacheKey(query);
            return normalized && !queryHistory.has(normalized);
          });
          if (!queuedQueries.length) return [];
          await Promise.all(
            queuedQueries.map((query) => {
              if (queryHistory.size >= queryLimit) return Promise.resolve([]);
              return runQuery(query, stage);
            })
          );
          return queuedQueries;
        };

        return (async () => {
          const runParallel = [];
          if (stageLimit >= 1 && stages[1]?.length) {
            const stageOneBudget = Math.min(PRIMARY_MECHANIC_STAGE1_QUERY_LIMIT, stages[1].length, Math.max(1, queryLimit));
            stages[1].slice(0, stageOneBudget).forEach((query) => {
              runParallel.push(runQuery(query, 1));
            });
          }
          if (stageLimit >= 2 && stages[2]?.length) runParallel.push(runQuery(stages[2][0], 2));
          if (runParallel.length) {
            await Promise.all(runParallel);
          }

        if (candidateMap.size >= minPool || queryHistory.size >= queryLimit) {
            safeState.candidateMap = candidateMap;
            safeState.candidateMeta = candidateMeta;
            safeState.queryHistory = queryHistory;
            return {
              candidates: Array.from(candidateMap.values()),
              stageMeta: Object.fromEntries(Array.from(candidateMeta.entries())),
              state: safeState,
          };
          }

          if (needsMechanicRecallFallback && stageLimit >= 2 && candidateMap.size < strictCandidateTarget && stages[2]?.length > 1) {
            await runStage(2, 1, 1);
          } else if (stages[2]?.length > 1 && stageLimit >= 2) {
            await runStage(2, 1, 0);
          }

          for (const stage of stagesByOrder.slice(2)) {
            if (stage > stageLimit) break;
            if (candidateMap.size >= minPool || queryHistory.size >= queryLimit) break;
            if (!stages[stage]?.length) continue;
            if (needsMechanicRecallFallback && stage === 3 && candidateMap.size >= strictCandidateTarget) break;
            const remainingQueries = Math.max(1, queryLimit - queryHistory.size);
            const budgetedQueries = Math.min(2, remainingQueries, stages[stage].length);
            await runStage(stage, budgetedQueries);
          }

          safeState.candidateMap = candidateMap;
          safeState.candidateMeta = candidateMeta;
          safeState.queryHistory = queryHistory;
          return {
            candidates: Array.from(candidateMap.values()),
            stageMeta: Object.fromEntries(Array.from(candidateMeta.entries())),
            state: safeState,
          };
        })();
      }

      function scoreByRole(seed, candidate) {
        const roleScore = weightedAliasJaccard(seed.roleSignals || {}, candidate.roleSignals || {});
        const baseScore = clamp(roleScore);
        const seedCreature = seed.mainType === 'creature';
        const candidateCreature = candidate.mainType === 'creature';
        const seedPlaneswalker = seed.mainType === 'planeswalker';
        const candidatePlaneswalker = candidate.mainType === 'planeswalker';

        if (seedCreature && candidateCreature) {
          const seedHasStats = Number.isFinite(seed.power) && Number.isFinite(seed.toughness);
          const candidateHasStats = Number.isFinite(candidate.power) && Number.isFinite(candidate.toughness);
          const combatSignalSeed = Number(seed.roleSignals?.combat || 0);
          const combatSignalCandidate = Number(candidate.roleSignals?.combat || 0);
          const ptDiff = seedHasStats && candidateHasStats
            ? Math.abs((seed.power + seed.toughness) - (candidate.power + candidate.toughness))
            : 4;
          const ptScore = clamp(1 - Math.min(ptDiff, 12) / 12);
          const combatMatch = clamp((combatSignalSeed + combatSignalCandidate) / 2);
          return clamp(0.50 * baseScore + 0.28 * ptScore + 0.22 * combatMatch);
        }

        if (seedPlaneswalker && candidatePlaneswalker) {
          const loyaltyScore =
            Number.isFinite(seed.loyalty) && Number.isFinite(candidate.loyalty)
              ? clamp(1 - Math.min(Math.abs(seed.loyalty - candidate.loyalty), 12) / 12)
              : 0.5;
          const controlSignal = clamp(
