            (Number(seed.roleSignals?.control || 0) + Number(candidate.roleSignals?.control || 0)) / 2
          );
          return clamp(0.58 * baseScore + 0.22 * loyaltyScore + 0.2 * controlSignal);
        }

        if (baseScore > 0) return baseScore;
        return 0.48;
      }

      function scoreByPrimaryMechanic(seed, candidate) {
        const seedMechanics = uniqueValues(seed?.primaryMechanics || []);
        const candidateMechanics = uniqueValues(candidate?.primaryMechanics || []);
        const topMechanic = seedMechanics[0] || '';
        const alignment = evaluatePrimaryMechanicAlignment(seed, candidate);
        const sharedPrimaryMechanics = getSharedPrimaryMechanics(seed, candidate);
        const sharedEventSignatures = getSharedEventSignatures(seed, candidate);
        const sharedIntents = getSharedAbilityIntents(seed, candidate);
        const seedMechanicBuckets = getSharedMechanicBuckets(seed, candidate);

        const sharedBucketBoost = seedMechanicBuckets.length
          ? clamp(seedMechanicBuckets.reduce((acc) => acc + 0.2, 0) / seedMechanicBuckets.length, 0, 1)
          : 0;
        const candidateSet = new Set(candidateMechanics);
        const sharedPrimaryCount = seedMechanics.filter((mechanic) => candidateSet.has(mechanic)).length;
        const topMechanicScore = getPrimaryMechanicScore(seed, topMechanic);
        const topMechanicAliases = uniqueValues([
          topMechanic,
          ...getPrimaryMechanicCoreSignatures(topMechanic),
          ...getPrimaryMechanicTextSignalSet(topMechanic),
        ]);
        const topMechanicAliasSet = new Set(topMechanicAliases.map((entry) => safeLower(entry)));
        const sharedTopAliasEvent = sharedEventSignatures.some((signature) => topMechanicAliasSet.has(safeLower(signature.id)));
        const sharedIntentCount = sharedIntents.length;
        const sharedEventCount = sharedEventSignatures.length;
        const sharedDirectEventCount = sharedEventSignatures.filter((signature) => !signature.family).length;
        const directSharedEventWeight = sharedEventSignatures
          .filter((signature) => !signature.family)
          .reduce((acc, signature) => acc + Number(signature.weight || 0), 0);
        const hasTopTextMatch = hasPrimaryMechanicTextSupport(seed, candidate, topMechanic);
        const hasMechanicBaseMatch = alignment.hasAffinity || sharedTopAliasEvent || sharedIntentCount > 0;
        const hasSeedMechanic = seedMechanics.length > 0;
        const hasCandidateMechanic = candidateMechanics.length > 0;

        if (!hasSeedMechanic && !hasCandidateMechanic) return 0.32;
        if (!hasSeedMechanic || !hasCandidateMechanic) {
          return hasMechanicBaseMatch ? 0.28 + sharedBucketBoost * 0.06 : (seedMechanicBuckets.length ? 0.18 : 0.08);
        }

        if (alignment.hardAnchor) {
          if (alignment.matchMode === 'direct' || sharedTopAliasEvent || sharedDirectEventCount > 0 || hasTopTextMatch || sharedPrimaryCount > 0) {
            const affinity = clamp(0.74 + sharedBucketBoost * 0.15 + Math.min(0.2, directSharedEventWeight * 0.08));
            return clamp(0.96 * affinity);
          }
          if (hasTopTextMatch) return clamp(0.82 + sharedBucketBoost * 0.12);
          if (sharedTopAliasEvent || sharedIntentCount >= 2) return clamp(0.46 + sharedBucketBoost * 0.1);
          return clamp(0.12 + sharedBucketBoost * 0.08 + Math.min(0.12, sharedIntentCount * 0.04));
        }

        if (alignment.matchMode === 'direct') {
          return clamp(0.94 + sharedBucketBoost * 0.05 + Math.min(0.04, directSharedEventWeight * 0.05) + Math.min(0.02, sharedIntentCount * 0.02));
        }

        if (alignment.matchMode === 'core') {
          return clamp(
            0.86 +
              sharedBucketBoost * 0.08 +
              (alignment.sharedCount ? 0.06 : 0) +
              (sharedTopAliasEvent ? 0.08 : 0) +
              Math.min(0.04, sharedIntentCount * 0.02)
          );
        }

        if (alignment.matchMode === 'bucket') {
          const intentPenalty = topMechanicScore >= PRIMARY_MECHANIC_SOFT_ANCHOR_MIN ? -0.15 : 0;
          return clamp(
            0.30 +
              sharedBucketBoost * 0.12 +
              sharedPrimaryCount * 0.06 +
              Math.min(0.08, sharedIntentCount * 0.02) +
              Math.min(0.05, directSharedEventWeight * 0.05) +
              intentPenalty
          );
        }

        const overlapRatio = sharedPrimaryCount / Math.max(seedMechanics.length, candidateMechanics.length, 1);
        const fallbackOverlapScore = clamp(
          PRIMARY_MECHANIC_MATCH_FLOOR +
            overlapRatio * 0.35 +
            sharedEventCount * 0.08 +
            sharedIntentCount * 0.08 +
            sharedBucketBoost * 0.16 +
            (hasTopTextMatch ? 0.12 : 0)
        );

        return fallbackOverlapScore > 0 ? fallbackOverlapScore : PRIMARY_MECHANIC_MIN_SHARED_SCORE;
      }

      function hasPrimaryMechanicTextSupport(seedProfile = {}, candidateProfile = {}, topMechanic = '') {
        const normalizedMechanic = safeLower(topMechanic);
        if (!normalizedMechanic) return false;

        const seedSignatures = new Set(
          (Array.isArray(seedProfile?.eventSignatures) ? seedProfile.eventSignatures : []).map((entry) => safeLower(entry?.id || entry))
        );
        const candidateSignatures = new Set(
          (Array.isArray(candidateProfile?.eventSignatures) ? candidateProfile.eventSignatures : []).map((entry) => safeLower(entry?.id || entry))
        );
        const coreSignatures = getPrimaryMechanicCoreSignatures(normalizedMechanic);
        if (coreSignatures.length) {
          const coreMatch = coreSignatures.some((signatureId) => seedSignatures.has(signatureId) && candidateSignatures.has(signatureId));
          if (coreMatch) return true;
        }

        const topMechanicSignals = uniqueValues([
          normalizedMechanic,
          ...getPrimaryMechanicTextSignalSet(normalizedMechanic),
          ...getPrimaryMechanicCoreSignatures(normalizedMechanic),
        ]);
        if (topMechanicSignals.length) {
          const seedIntentSet = new Set(
            (Array.isArray(seedProfile?.abilityIntents) ? seedProfile.abilityIntents : []).map((entry) => safeLower(entry?.id || entry))
          );
          const candidateIntentSet = new Set(
            (Array.isArray(candidateProfile?.abilityIntents) ? candidateProfile.abilityIntents : []).map((entry) => safeLower(entry?.id || entry))
          );
          if (topMechanicSignals.some((signal) => seedIntentSet.has(signal) && candidateIntentSet.has(signal))) return true;
        }

        const seedText = safeLower(seedProfile?.oracle_text || seedProfile?.oracleText || '');
        const candidateText = safeLower(candidateProfile?.oracle_text || candidateProfile?.oracleText || '');
        const seedHas = (text, term) => text && text.includes(safeLower(term));

        if (
          ['sig_death_to_life_drain', 'death_to_life_drain', 'sig_life_drain_on_creature_dies', 'sig_death_life_exchange', 'sig_creature_life_transfer'].includes(
            normalizedMechanic
          )
        ) {
          const seedCausalSignatures = new Set(
            (Array.isArray(seedProfile?.causalSignatures) ? seedProfile.causalSignatures : []).map((entry) => safeLower(entry || ''))
          );
          const candidateCausalSignatures = new Set(
            (Array.isArray(candidateProfile?.causalSignatures) ? candidateProfile.causalSignatures : []).map((entry) => safeLower(entry || ''))
          );
          if ([...seedCausalSignatures].some((signature) => candidateCausalSignatures.has(signature))) return true;
        }

        if (
          ['sig_death_to_life_drain', 'death_to_life_drain', 'sig_life_drain_on_creature_dies', 'sig_death_life_exchange', 'sig_creature_life_transfer'].includes(
            normalizedMechanic
          ) &&
          hasMechanicTextAnchor(seedText, candidateText, normalizedMechanic)
        ) {
          return true;
        }
        if (
          ['sig_death_to_life_drain', 'death_to_life_drain', 'sig_life_drain_on_creature_dies', 'sig_death_life_exchange', 'sig_creature_life_transfer'].includes(
            normalizedMechanic
          ) &&
          hasPairedLifeTransferPattern(seedText) &&
          hasPairedLifeTransferPattern(candidateText)
        ) {
          return true;
        }

        const coreTerms = uniqueValues(
          getPrimaryMechanicCoreSignatures(normalizedMechanic).flatMap((signatureId) => EVENT_SIGNATURE_QUERY_TERMS[safeLower(signatureId)] || [])
        );
        const topMechanicTerms = uniqueValues((getPrimaryMechanicQueryTerms(normalizedMechanic) || []).concat(coreTerms));
        const matchedCoreTerms = coreTerms.filter((term) => seedHas(seedText, term) && seedHas(candidateText, term));
        if (matchedCoreTerms.length >= 2) return true;
        if (topMechanicTerms.some((term) => seedHas(seedText, term) && seedHas(candidateText, term))) return true;

        const topMechanicSignalsInText = topMechanicSignals.some((signalId) => {
          const signalTerms = uniqueValues(EVENT_SIGNATURE_QUERY_TERMS[safeLower(signalId)] || []);
          return signalTerms.some((term) => term && seedHas(seedText, term) && seedHas(candidateText, term));
        });
        if (topMechanicSignalsInText) return true;

        if (normalizedMechanic.includes('combat_transfer') || normalizedMechanic.includes('sig_combat_involvement')) {
          const combatSeed = /\b(?:combat|combate|attacks|attack|ataca|dano de combate|combat damage)\b/.test(seedText);
          const combatCandidate = /\b(?:combat|combate|attacks|attack|ataca|dano de combate|combat damage)\b/.test(candidateText);
          const creatureSource =
            /\b(?:creature|criatura|creatures|criaturas)\b/.test(seedText) && /\b(?:creature|criatura|creatures|criaturas)\b/.test(candidateText);
          return combatSeed && combatCandidate && creatureSource;
        }

        if (normalizedMechanic.includes('draw_or_discard') || normalizedMechanic.includes('draw')) {
          const drawSeed = /\b(?:draw|compra|draws|draw a|draws a card|draw cards)\b/.test(seedText);
          const drawCandidate = /\b(?:draw|compra|draws|draw a|draws a card|draw cards)\b/.test(candidateText);
          return drawSeed && drawCandidate;
        }

        return false;
      }

      function getSharedMechanicBuckets(seed = {}, candidate = {}) {
        const seedBuckets = seed?.primaryMechanicBuckets || {};
        const candidateBuckets = candidate?.primaryMechanicBuckets || {};
        return Object.entries(seedBuckets)
          .filter(([bucket]) => candidateBuckets[bucket])
          .sort((left, right) => (right[1] || 0) - (left[1] || 0));
      }

      function scoreByMechanicBucket(seed = {}, candidate = {}) {
        const seedBuckets = seed?.primaryMechanicBuckets || {};
        const candidateBuckets = candidate?.primaryMechanicBuckets || {};
        const keys = new Set([...Object.keys(seedBuckets), ...Object.keys(candidateBuckets)]);
        if (!keys.size) return 0.45;

        let overlap = 0;
        let union = 0;
        keys.forEach((bucket) => {
          const leftScore = Number(seedBuckets[bucket] || 0);
          const rightScore = Number(candidateBuckets[bucket] || 0);
          overlap += Math.min(leftScore, rightScore);
          union += Math.max(leftScore, rightScore);
        });

        if (!union) return 0.45;
        const baseScore = clamp(overlap / union);
        if (baseScore > 0.95) return 1;
        if (baseScore >= 0.45) return clamp(0.45 + baseScore * 0.45);
        return clamp(0.2 + baseScore * 0.55);
      }

      function scoreByType(seed, candidate) {
        const mainMatch = seed.mainType && candidate.mainType && seed.mainType === candidate.mainType ? 1 : 0;
        const familyAliasMatch = weightedAliasJaccard(seed.familyAliases || {}, candidate.familyAliases || {});
        const subtypeMatch = jaccard(seed.subTypes, candidate.subTypes);
        const superMatch = jaccard(seed.superTypes, candidate.superTypes);
        return clamp(
          0.56 * mainMatch +
            0.20 * superMatch +
            0.12 * subtypeMatch +
            0.12 * familyAliasMatch
        );
      }

      function scoreByColor(seed, candidate) {
        const seedColors = toSet(seed.colorIdentity);
        const candidateColors = toSet(candidate.colorIdentity);
        const seedManaVector = seed.manaVector || {};
        const candidateManaVector = candidate.manaVector || {};
        let intersect = 0;
        let union = 0;

        MANA_VECTOR_KEYS.forEach((key) => {
          const seedValue = Number(seedManaVector[key] || 0);
          const candidateValue = Number(candidateManaVector[key] || 0);
          intersect += Math.min(seedValue, candidateValue);
          union += Math.max(seedValue, candidateValue);
        });

        const vectorScore = union > 0 ? clamp(intersect / union) : 0.45;
        const identityScore = jaccard(seedColors, candidateColors);
        let score = 0.75 * vectorScore + 0.25 * identityScore;

        if (seedColors.size > 0 && candidateColors.size > 0) {
          const exact = [...seedColors].every((value) => candidateColors.has(value)) && seedColors.size === candidateColors.size;
          if (exact) score = clamp(score + 0.2);
        } else if (seedColors.size === 0 && candidateColors.size === 0) {
          score = clamp(score + 0.05);
        } else if (intersect === 0) {
          score = clamp(score - 0.15);
        }

        return score;
      }

      function scoreByCmc(seed, candidate) {
        if (!Number.isFinite(seed.cmc) || !Number.isFinite(candidate.cmc)) return 0.45;
        return clamp(1 - Math.min(Math.abs(seed.cmc - candidate.cmc), 4) / 4);

      function normalizeIntentText(text) {
        return safeLower(text)
          .replace(/\{[^}]*\}/g, ' ')
          .replace(/\([^)]*\)/g, ' ')
          .replace(/[^\w\s]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function splitOracleSentences(text) {
        return normalizeIntentText(text).split(/[.;!?]+/g).map((value) => value.trim()).filter(Boolean);
      }

      function getCachedAbilityIntentSignals(normalized) {
        const cached = INTENT_CACHE.get(normalized);
        if (!cached) return null;
        if (Date.now() - cached.ts > INTENT_CACHE_TTL_MS) {
          INTENT_CACHE.delete(normalized);
          return null;
        }
        return cached.value;
      }

      function setCachedAbilityIntentSignals(normalized, value) {
        INTENT_CACHE.set(normalized, {
          ts: Date.now(),
          value,
        });
      }

      function getAbilityIntentSignals(text = '') {
        const normalized = normalizeIntentText(text);
        if (!normalized) return [];
        const cached = getCachedAbilityIntentSignals(normalized);
        if (cached) return cached;

        const sentences = splitOracleSentences(normalized);
        const signals = [];

        for (const rule of ABILITY_INTENT_RULES) {
          const matches = sentences.filter((sentence) => rule.test(sentence));
          if (!matches.length) continue;

          const confidence = clamp(0.45 + 0.18 * Math.min(1, matches.length / 2), 0, 1);
          signals.push({
            id: rule.id,
            label: ABILITY_INTENT_LABELS[rule.id] || rule.label,
            weight: Number(rule.weight) || 1,
            confidence,
          });
        }

        setCachedAbilityIntentSignals(normalized, signals);
        return signals;
      }

      function getSharedAbilityIntents(seed = {}, candidate = {}) {
        const seedSignals =
          Array.isArray(seed?.abilityIntents) && seed.abilityIntents.length
            ? seed.abilityIntents
            : getAbilityIntentSignals(seed.oracle_text || seed.oracleText || seed.cardText || '');
        const candidateSignals =
          Array.isArray(candidate?.abilityIntents) && candidate.abilityIntents.length
            ? candidate.abilityIntents
            : getAbilityIntentSignals(candidate.oracle_text || candidate.oracleText || candidate.cardText || '');
        const candidateSet = new Map(candidateSignals.map((intent) => [intent.id, intent]));

        return seedSignals
          .filter((intent) => candidateSet.has(intent.id))
          .map((intent) => ({ ...intent, candidateConfidence: candidateSet.get(intent.id)?.confidence || 0 }))
          .sort((left, right) => (right.weight + right.candidateConfidence) - (left.weight + left.candidateConfidence));
      }

      function scoreByText(seed, candidate) {
        const keywordScore = jaccard(seed.keywordTokens, candidate.keywordTokens);
        const oracleScore = jaccard(seed.oracleTokens, candidate.oracleTokens);
        const phraseScore = jaccard(seed.textBigrams || [], candidate.textBigrams || []);
        const phaseScore = jaccard(Object.keys(seed.phaseSignals || {}), Object.keys(candidate.phaseSignals || {}));
        const sharedPriorityMechanics = PRIORITY_MECHANICS.filter(
          (mechanic) => seed.keywordSet?.has(mechanic) && candidate.keywordSet?.has(mechanic)
        ).length / PRIORITY_MECHANICS.length;

        const sharedIntents = getSharedAbilityIntents(seed, candidate);
        const sharedEventSignatures = getSharedEventSignatures(seed, candidate);
        const sharedCausalSignatures = getSharedCausalSignatures(seed, candidate);
        const eventEval = scoreByEventSignature(seed, candidate);
        const eventScore = eventEval.score;
        const eventReasons = eventEval.reasons || [];
        const seedTopMechanic = uniqueValues(seed?.primaryMechanics || [])[0];
        const topMechanicTextMatch = hasPrimaryMechanicTextSupport(seed, candidate, seedTopMechanic);
        const eventEvidence = sharedEventSignatures.some((signature) =>
          ['sig_death_to_life_drain', 'sig_life_drain_on_creature_dies', 'sig_death_life_exchange', 'sig_sacrifice_value'].includes(
            safeLower(signature.id)
          )
        );
        const pairedLifeTransferEvidence = hasPairedLifeTransferPattern(seed.oracleText || seed.oracle_text || '') &&
          hasPairedLifeTransferPattern(candidate.oracleText || candidate.oracle_text || '');
        const hasStrongLifeDrainEvent = sharedEventSignatures.some((signature) =>
          ['sig_death_to_life_drain', 'sig_death_life_exchange', 'sig_life_drain_on_creature_dies'].includes(
            safeLower(signature.id)
          )
        );
        const hasSharedCausalSignature = sharedCausalSignatures.length > 0;
        const eventMechanicMatch = sharedEventSignatures.length > 0 || eventScore > 0;
        const eventSignatureDirectMatch = sharedEventSignatures.filter((signature) => !signature.family).length;
        const eventSignatureFamilyMatch = sharedEventSignatures.filter((signature) => signature.family).length;
        const hasStrongMechanicSeed =
          getPrimaryMechanicScore(seed, seedTopMechanic || '') >= PRIMARY_MECHANIC_HARD_ANCHOR_MIN;
        const hasMechanicalGrounding = getSharedPrimaryMechanics(seed, candidate).length > 0 || eventEvidence;

        const directEventScore =
          eventSignatureDirectMatch && sharedEventSignatures.filter((signature) => !signature.family).reduce((acc, signature) => acc + Number(signature.weight || 0), 0);
        const familyEventScore =
          eventSignatureFamilyMatch && sharedEventSignatures.filter((signature) => signature.family).reduce(
            (acc, signature) => acc + Number(signature.weight || 0),
            0
          ) || 0;
        const directEventCoverage = Math.min(1, directEventScore / 4);

        const intentStrength =
          sharedIntents.length === 0
            ? 0
            : sharedIntents.reduce(
                (acc, intent) => acc + Number(intent.weight || 0) * (Number(intent.confidence || 0) + Number(intent.candidateConfidence || 0)) / 2,
                0
              );
        const semanticSignal = clamp(
          (eventScore * 0.72 +
            (hasSharedCausalSignature ? 0.12 : 0) +
            directEventCoverage * 0.2 +
            (intentStrength / Math.max(1, INTENT_BONUS_MAX)) * 0.14 +
            sharedPriorityMechanics * 0.08 +
            phaseScore * 0.08 +
            (topMechanicTextMatch ? 0.11 : 0))
        );
        const lexicalSignal = clamp(0.55 * phraseScore + 0.2 * oracleScore + 0.2 * keywordScore + 0.05 * sharedPriorityMechanics);

        const semanticMismatchPenalty =
          hasStrongMechanicSeed && hasStrongLifeDrainEvent && !hasMechanicalGrounding && sharedEventSignatures.length === 0 ? 0.12 : 0;
        const conflictPenalty =
          seed.keywordSet?.has('protection') && (candidate.keywordSet?.has('destroy') || candidate.keywordSet?.has('exile') || candidate.keywordSet?.has('remove'))
            ? 0.06
            : 0;
        const sparseTextPenalty = sharedEventSignatures.length === 0 && Number(seed.semanticSignalConfidence || 0) >= 0.6 ? 0.04 : 0;
        const familyPenalty = sharedEventSignatures.some((signature) => signature.family) && sharedEventSignatures.every((signature) => signature.family)
          ? 0.06
          : 0;

        const baseTextScore = clamp(
          0.66 * semanticSignal +
            0.34 * lexicalSignal +
            (hasStrongLifeDrainEvent ? 0.04 : 0) +
            (pairedLifeTransferEvidence ? 0.02 : 0) +
            (hasSharedCausalSignature ? 0.06 : 0) +
            (eventMechanicMatch ? 0 : (hasStrongLifeDrainEvent ? -0.16 : 0)) +
            (hasStrongMechanicSeed && !hasMechanicalGrounding ? -0.10 : 0) +
            (familyEventScore ? 0.02 : 0) -
            semanticMismatchPenalty -
            conflictPenalty -
            sparseTextPenalty -
            familyPenalty
        );

        const textScore = clamp(
          baseTextScore +
            (eventScore > 0.55 ? 0.02 : 0) +
            (directEventScore >= 1 ? 0.03 : 0) -
            (familyEventScore > 2 ? 0.01 : 0)
        );

        const reasons = [];
        if (topMechanicTextMatch) {
          reasons.push('Mecânica principal validada por assinatura textual compartilhada.');
        }
        if (hasStrongLifeDrainEvent) {
          reasons.push('Padrão causal principal: drenagem de vida ligada a morte de criatura.');
        } else if (eventMechanicMatch) {
          reasons.push('Assinatura causal compartilhada em padrão de evento.');
        }
        if (sharedIntents.length) {
          reasons.push(
            `Padrões semânticos comuns: ${sharedIntents
              .slice(0, 2)
              .map((intent) => intent.label || ABILITY_INTENT_LABELS[intent.id] || intent.id)
              .join(' + ')}`
          );
        }
        if (sharedCausalSignatures.length) {
          reasons.push(
            `Padrão causal estruturado em comum: ${sharedCausalSignatures.slice(0, 2).join(' + ')}`
          );
        }
        reasons.push(...eventReasons.slice(0, 1));

        return {
          score: clamp(textScore),
          reasons: uniqueValues(reasons).slice(0, 3),
        };
      }

      function cmcRangeLabel(seedCmc, candidateCmc) {
        if (!Number.isFinite(seedCmc) || !Number.isFinite(candidateCmc)) return '';
        const diff = Math.abs(seedCmc - candidateCmc);
        if (diff <= 0.4) return `Mesmo custo (${seedCmc})`;
        if (diff <= 1) return `CMC ${candidateCmc} (perto de ${seedCmc})`;
        return `CMC ${candidateCmc} (janela de custo ${Math.max(0, seedCmc - 1)}-${seedCmc + 1})`;
      }

      function scoreByRarity(seed, candidate) {
        if (!seed.rarity || !candidate.rarity) return 0.5;
        return seed.rarity === candidate.rarity ? 1 : 0.5;
      }

      function getSimilarityWeights(seedProfile = {}) {
        const base = { ...SIMILARITY_WEIGHTS };
        const mechanicCount = uniqueValues(seedProfile?.primaryMechanics || []).length;
        const primaryTopMechanic = uniqueValues(seedProfile?.primaryMechanics || [])[0];
        const topMechanicScore = getPrimaryMechanicScore(seedProfile, primaryTopMechanic);
        const semanticConfidence = clamp(Number(seedProfile?.semanticSignalConfidence || 0));
        const hasMechanicSignal = mechanicCount > 0;
        if (!hasMechanicSignal) return base;

        const mechanicLift = clamp(topMechanicScore || semanticConfidence, 0, 1);
        const mechanicBoost = clamp(
          (topMechanicScore >= PRIMARY_MECHANIC_HARD_ANCHOR_MIN
            ? 0.36
            : topMechanicScore >= PRIMARY_MECHANIC_SOFT_ANCHOR_MIN
              ? 0.26
              : 0.12) +
            clamp((mechanicCount - 1) * 0.02, 0, 0.06) +
            semanticConfidence * 0.08,
          0,
          0.4
        );
        const bucketBoost = clamp(uniqueValues(Object.keys(seedProfile?.primaryMechanicBuckets || {})).length * 0.01, 0, 0.06);
        if (mechanicBoost <= 0 && bucketBoost <= 0) return base;

        base.primaryMechanic = clamp(Math.max(base.primaryMechanic + mechanicBoost, PRIMARY_MECHANIC_SOFT_ANCHOR_MIN), 0, 1);
        base.mechanicBucket = clamp(base.mechanicBucket + bucketBoost);
        const compensation = (mechanicBoost + bucketBoost) * 0.15;
        base.type = clamp(base.type - compensation * 0.4, 0, 1);
        base.color = clamp(base.color - compensation * 0.25, 0, 1);
        base.cmc = clamp(base.cmc - compensation * 0.15, 0, 1);
        base.role = clamp(base.role - compensation * 0.08, 0, 1);
        if (topMechanicScore >= PRIMARY_MECHANIC_HARD_ANCHOR_MIN) {
          base.text = clamp(base.text * 0.72, 0, 1);
          base.role = clamp(base.role * 0.85, 0, 1);
        }
        return base;
      }

      function topRoleOverlap(seed, candidate, limit = 2) {
        return Object.entries(seed.roleSignals || {})
          .filter(([role]) => (candidate.roleSignals || {})[role])
          .sort((left, right) => {
            const leftSeed = Number(seed.roleSignals?.[left[0]] || 0);
            const rightSeed = Number(seed.roleSignals?.[right[0]] || 0);
            return rightSeed - leftSeed;
          })
          .slice(0, limit)
          .map(([role]) => role);
      }

      function roleLabel(role) {
        const map = {
          removal: 'remoção',
          draw: 'vantagem de cartas',
          ramp: 'aceleração de mana',
          combat: 'pressão em combate',
          tempo: 'resposta e ritmo',
          finisher: 'fechamento rápido',
          boardWipe: 'limpeza de mesa',
          control: 'controle de recursos',
          protection: 'proteção/estabilidade',
          sacrifice: 'sacrifício',
        };
        return map[role] || role;
      }

      function computeSimilarity(seed, candidate) {
        const primaryMechanicScore = scoreByPrimaryMechanic(seed, candidate);
        const mechanicBucketScore = scoreByMechanicBucket(seed, candidate);
        const typeScore = scoreByType(seed, candidate);
        const colorScore = scoreByColor(seed, candidate);
        const cmcScore = scoreByCmc(seed, candidate);
        const textEval = scoreByText(seed, candidate);
        const textScore = textEval.score;
        const roleScore = scoreByRole(seed, candidate);
        const rarityScore = scoreByRarity(seed, candidate);
        const primaryMechanicAlignment = evaluatePrimaryMechanicAlignment(seed, candidate);
        const dynamicWeights = getSimilarityWeights(seed);
        const weightSum = Object.values(dynamicWeights).reduce((acc, value) => acc + Number(value || 0), 0);

        const score =
          primaryMechanicScore * SIMILARITY_WEIGHTS.primaryMechanic +
          mechanicBucketScore * SIMILARITY_WEIGHTS.mechanicBucket +
          typeScore * SIMILARITY_WEIGHTS.type +
          colorScore * SIMILARITY_WEIGHTS.color +
          cmcScore * SIMILARITY_WEIGHTS.cmc +
          textScore * SIMILARITY_WEIGHTS.text +
          roleScore * SIMILARITY_WEIGHTS.role +
          rarityScore * SIMILARITY_WEIGHTS.rarity;
        const dynamicScore =
          primaryMechanicScore * dynamicWeights.primaryMechanic +
          mechanicBucketScore * dynamicWeights.mechanicBucket +
          typeScore * dynamicWeights.type +
          colorScore * dynamicWeights.color +
          cmcScore * dynamicWeights.cmc +
          textScore * dynamicWeights.text +
          roleScore * dynamicWeights.role +
          rarityScore * dynamicWeights.rarity;
        const normalizedScore = weightSum ? dynamicScore / weightSum : score;
        let finalScore = normalizedScore;

        const reasons = [];
        const reasonSet = new Set();
        const commonKeywords = [...candidate.keywordSet]
          .filter((value) => seed.keywordSet.has(value))
          .slice(0, 3);
        const sharedEventSignatures = getSharedEventSignatures(seed, candidate);
        const sharedMechanicBuckets = getSharedMechanicBuckets(seed, candidate);
        const sharedIntents = getSharedAbilityIntents(seed, candidate);
        const sharedPrimaryMechanics = getSharedPrimaryMechanics(seed, candidate);
        const topRole = topRoleOverlap(seed, candidate, 2);
        const commonAlias = Object.keys(seed.familyAliases || {}).filter((alias) => (candidate.familyAliases || {})[alias]);
        const topMechanic = uniqueValues(seed?.primaryMechanics || [])[0];
        const topMechanicMatched = topMechanic && sharedPrimaryMechanics.includes(topMechanic);
        const topMechanicConfidence = getPrimaryMechanicScore(seed, topMechanic);
        const strongMechanicAnchor = topMechanicConfidence >= PRIMARY_MECHANIC_HARD_ANCHOR_MIN;
        const topMechanicNeedsMatch = topMechanicConfidence >= PRIMARY_MECHANIC_SOFT_ANCHOR_MIN && !primaryMechanicAlignment.hasAffinity;
        const hasPrimaryEventMatch = sharedEventSignatures.some((signature) =>
          ['sig_death_to_life_drain', 'sig_death_life_exchange', 'sig_life_drain_on_creature_dies', 'sig_creature_life_transfer', 'sig_creature_death'].includes(
            safeLower(signature.id)
          )
        );
        const hasPrimaryTextMatch = hasPrimaryMechanicTextSupport(seed, candidate, topMechanic);
        const hasMechanicBucketContinuity = primaryMechanicAlignment.matchMode === 'bucket' && primaryMechanicAlignment.sharedBuckets.length > 0;
        const topMechanicPriorityDemand = topMechanicConfidence >= PRIMARY_MECHANIC_SEMANTIC_GATE;
        const strongTopMatch = primaryMechanicAlignment.matchMode === 'direct' || topMechanicPriorityDemand && hasPrimaryTextMatch;
        const topBucketGap = hasMechanicBucketContinuity && !hasPrimaryTextMatch && !hasPrimaryEventMatch;

        if (primaryMechanicAlignment.hardAnchor && !primaryMechanicAlignment.hasAffinity && !hasPrimaryTextMatch) {
          finalScore = clamp(finalScore * (1 - PRIMARY_MECHANIC_HARD_MISMATCH_PENALTY));
        } else if (topMechanicPriorityDemand && !primaryMechanicAlignment.hasAffinity && !hasPrimaryTextMatch) {
          finalScore = clamp(finalScore * PRIMARY_MECHANIC_MISS_SOFTENING);
        } else if (
          topMechanicPriorityDemand &&
          primaryMechanicAlignment.matchMode === 'bucket' &&
          !hasPrimaryEventMatch &&
          !hasPrimaryTextMatch
        ) {
          finalScore = clamp(finalScore * 0.78);
        }

        if (topMechanicPriorityDemand && hasPrimaryTextMatch && !primaryMechanicAlignment.hasAffinity) {
          finalScore = clamp(finalScore + PRIMARY_MECHANIC_TEXT_DOMINANCE_BOOST);
        }
        if (!topMechanicPriorityDemand && strongTopMatch) finalScore = clamp(finalScore + PRIMARY_MECHANIC_TEXT_DOMINANCE_BOOST * 0.5);
        if (topBucketGap) finalScore = clamp(finalScore * 0.88);
        if (primaryMechanicAlignment.matchMode === 'direct') {
          finalScore = clamp(finalScore + 0.04);
        } else if (
          primaryMechanicAlignment.matchMode === 'core' &&
          primaryMechanicScore >= PRIMARY_MECHANIC_CORE_MATCH_SCORE - 0.04
        ) {
          finalScore = clamp(finalScore + 0.02);
        }

        if (primaryMechanicAlignment.matchMode === 'direct' && sharedEventSignatures.some((signature) => !signature.family)) {
          const anchorBonus = clamp(primaryMechanicAlignment.matchMode === 'direct' && topMechanicConfidence >= PRIMARY_MECHANIC_HARD_ANCHOR_MIN
            ? PRIMARY_MECHANIC_EXACT_MATCH_BONUS
            : 0.03);
          finalScore = clamp(finalScore + anchorBonus);
        } else if (strongMechanicAnchor && !topMechanicNeedsMatch) {
          finalScore = clamp(finalScore + 0.01);
        }
        const strongCausalMatch = sharedEventSignatures.some((signature) =>
          ['sig_death_to_life_drain', 'sig_death_life_exchange', 'sig_life_drain_on_creature_dies', 'sig_creature_death'].includes(
            safeLower(signature.id)
          )
        );

        if (primaryMechanicAlignment.matchMode === 'direct') {
          const label = formatPrimaryMechanicLabel(topMechanic);
          reasonSet.add(`Mecânica principal priorizada alinhada: ${label}`);
        } else if (primaryMechanicAlignment.matchMode === 'core') {
          reasonSet.add('Padrão causal principal equivalente na mecânica principal (match estrutural).');
        } else if (primaryMechanicAlignment.matchMode === 'bucket') {
          reasonSet.add(`Compartilha família mecânica (${primaryMechanicAlignment.sharedBuckets.slice(0, 1).map(([bucket]) => bucketLabel(bucket)).join(' / ') || 'compatível'}).`);
        } else if (primaryMechanicAlignment.hardAnchor && !primaryMechanicAlignment.hasAffinity) {
          reasonSet.add('Mecânica principal forte sem assinatura correspondente; candidato priorizado só fora de eixo se sem retorno.');
        } else if (strongCausalMatch || hasPrimaryTextMatch) {
          reasonSet.add('Padrão causal principal equivalente encontrado.');
        } else if (primaryMechanicScore <= PRIMARY_MECHANIC_MISS_PENALTY && sharedPrimaryMechanics.length > 0) {
          reasonSet.add('Mecânica principal divergente no eixo principal; mantém-se apenas pelo encaixe parcial de estrutura.');
        }

        if (sharedPrimaryMechanics.length) {
          reasonSet.add(`Mecânica principal em comum: ${sharedPrimaryMechanics.slice(0, 2).map(formatPrimaryMechanicLabel).join(' + ')}`);
        }
        if (sharedMechanicBuckets.length) {
          reasonSet.add(
            `Família mecânica em comum: ${sharedMechanicBuckets
              .slice(0, 2)
              .map(([bucket]) => bucketLabel(bucket))
              .join(' + ')}`
          );
        }
        if (sharedEventSignatures.length) {
          const eventReasons = sharedEventSignatures
            .slice(0, 2)
            .map((signature) => (signature.family ? 'assinatura causal associada: ' : 'assinatura causal: ') + signature.label);
          reasonSet.add(eventReasons.join(' + '));
        }
        if (textEval.reasons?.length) {
          textEval.reasons.slice(0, 1).forEach((reason) => {
            reasonSet.add(reason);
          });
        }

        if (typeScore >= 0.72 && seed.mainType) {
          reasonSet.add(`Mesmo tipo principal: ${seed.mainType}`);
        }
        if (sharedIntents.length) {
          const topIntentLabels = sharedIntents.slice(0, 2).map((intent) => `padrão semântico: ${intent.label}`);
          reasonSet.add(topIntentLabels.join(' + '));
        } else if (primaryMechanicScore < 0.3 && seed.mainType) {
          reasonSet.add(`Mecânica principal não encontra paridade direta; priorizado por ${seed.mainType === 'creature' ? 'padrões de criatura/combate' : 'padrão estrutural da carta'}.`);
        }
        if (seed.superTypes.length && jaccard(seed.superTypes, candidate.superTypes) > 0.5) {
          const superType = (seed.superTypes[0] || '').replace('-', ' ');
          reasonSet.add(`Família de supertipos similar (${superType || 'principal'})`);
        }
        if (commonAlias.length) {
          reasonSet.add(`Mesmo perfil de família: ${commonAlias.slice(0, 2).join(', ')}`);
        }

        if (colorScore >= 0.72) {
          if (seed.colorIdentity.length === 0 && candidate.colorIdentity.length === 0) {
            reasonSet.add('Ambas sem cor de mana (artefatos ou incolores)');
          } else {
            const costLabel = seed.manaPattern?.cmcExact != null ? `CMC ${seed.manaPattern.cmcExact}` : 'custo baixo';
            reasonSet.add(`Mesma assinatura de custo: ${costLabel}`);
          }
        }

        const cmcReason = cmcRangeLabel(seed.cmc, candidate.cmc);
        if (cmcReason) {
          reasonSet.add(cmcReason);
        }

        if (topRole.length) {
          reasonSet.add(`Mesmo papel: ${topRole.map(roleLabel).join(' + ')}`);
        }

        if (commonKeywords.length) {
          reasonSet.add(`Comparte mecânicas: ${commonKeywords.join(', ')}`);
        }

        if (seed.mainType === 'creature' && candidate.mainType === 'creature') {
          const seedHasPT = Number.isFinite(seed.power) && Number.isFinite(seed.toughness);
          const candidateHasPT = Number.isFinite(candidate.power) && Number.isFinite(candidate.toughness);
          if (seedHasPT && candidateHasPT) {
            const delta = Math.abs(seed.power - candidate.power) + Math.abs(seed.toughness - candidate.toughness);
            reasonSet.add(delta <= 3 ? 'Ação de combate parecida (força/resistência)' : 'Função de combate comparável');
          }
        }

        if (!reasonSet.size) {
          reasonSet.add('Sem padrão textual suficiente; priorizado por custo/tipo/cor.');
        }

        const reasonValues = Array.from(reasonSet);
        return {
          score: clamp(finalScore),
          reasons: reasonValues.slice(0, 4),
          components: {
            primaryMechanic: primaryMechanicScore,
            mechanicBucket: mechanicBucketScore,
            type: typeScore,
            color: colorScore,
            cmc: cmcScore,
            text: textScore,
            role: roleScore,
            rarity: rarityScore,
          },
        };
      }

      function getCardImage(card, faceIndex = 0) {
        const source = getPrimaryFace(card, faceIndex);
        if (source.image_uris?.normal) return source.image_uris.normal;
        if (source.image_uris?.art_crop) return source.image_uris.art_crop;
        if (card.image_uris?.normal) return card.image_uris.normal;
        if (card.image_uris?.art_crop) return card.image_uris.art_crop;
        return fallbackImage;
      }

      function getCardTitle(card, faceIndex = 0) {
        const source = getPrimaryFace(card, faceIndex);
        return source.name || card.name || 'Carta sem nome';
      }

      function getDetailLineWithMana(card, faceIndex = 0) {
        const source = getPrimaryFace(card, faceIndex);
        const parts = [];
        if (source.mana_cost || card.mana_cost) {
          const manaMarkup = buildManaSymbolMarkup(source.mana_cost || card.mana_cost);
          if (manaMarkup) parts.push(`<span class="mana-label">${manaMarkup}</span>`);
        }
        const typeLine = source.type_line || card.type_line;
        if (typeLine) parts.push(escapeHtml(typeLine));
        const rarity = source.rarity || card.rarity;
        if (rarity) parts.push(escapeHtml(rarity));
        const setName = card.set_name;
        if (setName) parts.push(`Set: ${escapeHtml(setName)}`);
        return parts.join('<span class="dot">•</span>') || 'Detalhes indisponíveis';
      }

      function scoreToPercent(score) {
        return `${Math.round(clamp(score) * 100)}%`;
      }

      function renderSimilarNotice(message) {
        const notice = document.createElement('div');
        notice.className = 'empty-state';
        notice.textContent = message;
        similarCardsEl.appendChild(notice);
      }

      function cardMarkup(card) {
        const canRotate = isDoubleFaced(card);
        const totalFaces = getFaceCount(card);
        let faceIndex = 0;
        const cardDiv = document.createElement('article');
        cardDiv.className = 'card';

        const button = document.createElement('button');
        button.type = 'button';
        button.addEventListener('click', () => showCardDetails(card, faceIndex));

        const media = document.createElement('div');
        media.className = 'card-media';

        const img = document.createElement('img');
        img.alt = '';

        const rotateBtn = document.createElement('span');
        rotateBtn.type = 'button';
        rotateBtn.className = 'card-rotate-btn';
        rotateBtn.textContent = '↻';
        rotateBtn.title = 'Ver outra face';
        rotateBtn.setAttribute('aria-label', 'Ver outra face');
        rotateBtn.hidden = !canRotate;

        const cardInfo = document.createElement('div');
        cardInfo.className = 'card-info';

        const title = document.createElement('h3');
        const detail = document.createElement('p');
        cardInfo.appendChild(title);
        cardInfo.appendChild(detail);

        media.appendChild(img);
        media.appendChild(rotateBtn);
        button.appendChild(media);
        button.appendChild(cardInfo);

        const renderFace = () => {
          const activeCard = getCardWithFace(card, faceIndex);
          img.src = getCardImage(card, faceIndex);
          img.alt = `Carta ${escapeHtml(getCardTitle(card, faceIndex))}`;
          title.textContent = getCardTitle(card, faceIndex);
          detail.innerHTML = getDetailLineWithMana(activeCard, faceIndex);
          rotateBtn.setAttribute(
            'aria-label',
            `Ver face ${faceIndex + 1} de ${totalFaces} de ${escapeHtml(
              getCardTitle(card)
            )}`
          );
        };

        renderFace();

        if (canRotate) {
          rotateBtn.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            faceIndex = (faceIndex + 1) % totalFaces;
            renderFace();
            button.focus();
          });
        }

        cardDiv.appendChild(button);
        return cardDiv;
      }

      function similarCardMarkup(similar) {
        const card = similar.card;
        const img = getCardImage(card);
        const title = getCardTitle(card);
        const detail = getDetailLineWithMana(card);
        const score = scoreToPercent(similar.score);
        const reasons = similar.reasons.length ? similar.reasons : ['Sem pistas mecânicas suficientes.'];

        const cardDiv = document.createElement('article');
        cardDiv.className = 'card';

        const button = document.createElement('button');
        button.type = 'button';
        button.addEventListener('click', () => showCardDetails(card));

        button.innerHTML = `
          <img src="${img}" alt="${escapeHtml(title)}" />
          <div class="card-info">
            <h3>${escapeHtml(title)}</h3>
            <p class="meta-line similar-score-row">
              <span class="similar-score-label">${score}</span>
              <span class="similar-score-bar"><span style="width: ${score}"></span></span>
            </p>
            <p class="similar-reasons">${escapeHtml(reasons.join(' • '))}</p>
            <p>${detail}</p>
          </div>
        `;

        cardDiv.appendChild(button);
        return cardDiv;
      }

      async function rankAndRenderSimilarCards(seedCard, faceIndex = 0) {
        const normalizedFace = normalizeFaceIndex(seedCard, faceIndex);
        const seedProfile = buildCardProfile(seedCard, normalizedFace);
        const collectState = {
          candidateMap: new Map(),
          candidateMeta: new Map(),
          queryHistory: new Set(),
        };

        const buildRank = (candidateCards, options = {}) => {
          const scored = [];
          const seen = new Set();
          const seedPrimaryMechanic = uniqueValues(seedProfile?.primaryMechanics || [])[0];
          const seedPrimaryAnchor = getPrimaryMechanicScore(seedProfile, seedPrimaryMechanic);
          const enforceAnchorHard = seedPrimaryAnchor >= PRIMARY_MECHANIC_HARD_ANCHOR_MIN;
          const enforceAnchorSoft = seedPrimaryAnchor >= PRIMARY_MECHANIC_SOFT_ANCHOR_MIN && !enforceAnchorHard;
          const relaxAnchor = options.relaxMechanicMatch === true;
          const anchorGate = enforceAnchorHard
            ? Math.max(PRIMARY_MECHANIC_STAGE1_MATCH_GATE_HARD, PRIMARY_MECHANIC_MATCH_FLOOR + 0.28)
            : enforceAnchorSoft
              ? Math.max(PRIMARY_MECHANIC_STAGE1_MATCH_GATE_SOFT, PRIMARY_MECHANIC_MATCH_FLOOR + 0.18)
              : PRIMARY_MECHANIC_MATCH_FLOOR;
          const anchorGateTolerance = relaxAnchor ? 0.16 : 0;

          for (const candidateCard of candidateCards) {
            const candidateKey = candidateCard?.oracle_id || candidateCard?.id;
            if (!candidateCard || !candidateKey) continue;
            if (candidateKey === seedProfile.oracleId || candidateKey === seedProfile.id) continue;
            if (safeLower(candidateCard.name) === safeLower(seedProfile.name)) continue;
            if (seen.has(candidateKey)) continue;
            seen.add(candidateKey);

            const candidateProfile = buildCardProfile(candidateCard);
            const evaluation = computeSimilarity(seedProfile, candidateProfile);
            if (!Number.isFinite(evaluation.score)) continue;
            const hasPrimaryTextSupport = hasPrimaryMechanicTextSupport(seedProfile, candidateProfile, seedPrimaryMechanic);
            const alignment = evaluatePrimaryMechanicAlignment(seedProfile, candidateProfile);
            const hasMechanicAffinitySignal = alignment?.hasAffinity || alignment?.matchMode === 'core' || hasPrimaryTextSupport;
            const hasStrongMechanicAnchor = enforceAnchorHard
              ? hasMechanicAffinitySignal && (alignment?.sharedBuckets?.length || hasPrimaryTextSupport)
              : enforceAnchorSoft && hasMechanicAffinitySignal;

            if ((enforceAnchorHard || enforceAnchorSoft) && evaluation.components?.primaryMechanic < anchorGate - anchorGateTolerance && !hasStrongMechanicAnchor) {
              continue;
            }
            if (enforceAnchorHard && !hasMechanicAffinitySignal && evaluation.components?.primaryMechanic >= anchorGate - 0.18 - anchorGateTolerance) {
              evaluation.components.primaryMechanic = clamp(evaluation.components.primaryMechanic * 0.7);
            }

            scored.push({
              card: candidateCard,
              score: evaluation.score,
              reasons: evaluation.reasons,
              components: evaluation.components,
            });
          }

          scored.sort((left, right) => {
            const leftPrimaryMechanic = Number(left?.components?.primaryMechanic || 0);
            const rightPrimaryMechanic = Number(right?.components?.primaryMechanic || 0);
            if (rightPrimaryMechanic !== leftPrimaryMechanic) return rightPrimaryMechanic - leftPrimaryMechanic;
            if (right.score !== left.score) return right.score - left.score;
            const leftName = String(left.card?.name || '');
            const rightName = String(right.card?.name || '');
            return leftName.localeCompare(rightName);
          });

          return scored;
        };

        const plans = [
          { stage: 1, threshold: SIMILARITY_MIN_SCORE, label: 'estágio 1' },
          { stage: 2, threshold: SIMILARITY_RELAXED_SCORE, label: 'estágio 2' },
          { stage: 3, threshold: SIMILARITY_RELAXED_SCORE, label: 'estágio 3' },
          { stage: 4, threshold: 0, label: 'estágio 4' },
        ];

        let scored = [];
        let filtered = [];
        let usedThreshold = plans[0].threshold;
        let usedExpandedPlan = false;
        let usedPlanLabel = plans[0].label;

        for (const plan of plans) {
          const collectResult = await collectCandidates(seedProfile, {
            maxStage: plan.stage,
            state: collectState,
            minPool: CANDIDATE_MIN_POOL,
          });
          scored = buildRank(collectResult.candidates, { relaxMechanicMatch: plan.stage > 1 });
          const withThreshold = scored.filter((entry) => entry.score >= plan.threshold);

          usedThreshold = plan.threshold;
          usedPlanLabel = plan.label;
          filtered = withThreshold;
          usedExpandedPlan = plan.stage > 1;

          if (filtered.length >= SIMILARITY_REQUIRED_TOP) break;
        }

        const fallbackUsed = usedThreshold < SIMILARITY_MIN_SCORE;

        if (filtered.length) {
          filtered = filtered.slice(0, SIMILAR_LIMIT);
        } else if (scored.length) {
          filtered = scored.slice(0, SIMILAR_LIMIT);
        } else {
          renderStatus('Falha ao calcular semelhantes.', true);
          similarCardsEl.innerHTML = '<div class="empty-state">Sem sugestão suficiente para esta carta.</div>';
          return;
        }

        clearCards(similarCardsEl);
        if ((usedExpandedPlan || fallbackUsed) && filtered.length > 0) {
          const limitLabel = usedThreshold === 0 ? '0.00' : `${Math.round(usedThreshold * 100)}%`;
          renderSimilarNotice(
            `Semântica insuficiente no estágio 1; expandindo para ${usedPlanLabel.toUpperCase()} (limiar de ${limitLabel}).`
          );
        }

        filtered.slice(0, SIMILAR_LIMIT).forEach((entry) => {
          similarCardsEl.appendChild(similarCardMarkup(entry));
        });
      }

      function clearCards(container) {
        while (container.firstChild) container.removeChild(container.firstChild);
      }

      async function fetchCards(url, signal) {
        const res = await fetch(url, signal ? { signal } : undefined);
        if (!res.ok) {
          const body = await res.text();
          throw new Error(`Erro no Scryfall: ${res.status} ${res.statusText} ${body}`);
        }
        return res.json();
      }

      function renderStatus(message, error = false) {
        statusEl.style.color = error ? 'var(--danger)' : 'var(--muted)';
        statusEl.textContent = message;
      }

      async function searchCards() {
        const query = cleanQuery(queryInput.value);
        if (!query) {
          renderStatus('Digite um termo de busca.', true);
          return;
        }

        await loadManaSymbols();
        searchBtn.disabled = true;
        renderStatus('Buscando cartas...');
        clearCards(resultsEl);
        clearCards(similarCardsEl);
        similarWrap.style.display = 'none';
        detailContent.className = 'empty-state';
        detailContent.textContent = 'Escolha uma carta para ver detalhes e sugestÃµes.';

        try {
          const payload = await fetchCards(
            `${API_BASE}/cards/search?q=${encodeURIComponent(query)}&order=name&dir=asc&unique=cards&format=json`
          );

          if (!payload?.data || payload.data.length === 0) {
            renderStatus('Nenhuma carta encontrada.');
            return;
          }

          const cards = payload.data.slice(0, SEARCH_LIMIT);
          cards.forEach((card) => {
            resultsEl.appendChild(cardMarkup(card));
          });
          renderStatus(`${payload.total_cards || cards.length} cartas encontradas (mostrando ${cards.length}).`);
        } catch (error) {
          renderStatus(`Falha na busca: ${error.message}`, true);
        } finally {
          searchBtn.disabled = false;
        }
      }

      async function showCardDetails(card, faceIndex = 0) {
        const normalizedFace = normalizeFaceIndex(card, faceIndex);
        const activeCard = getCardWithFace(card, normalizedFace);
        const totalFaces = getFaceCount(card);
        const canRotate = isDoubleFaced(card);

        detailState.card = card;
        detailState.faceIndex = normalizedFace;

        await loadManaSymbols();
        const manaMarkup = buildManaSymbolMarkup(activeCard.mana_cost);
        const cardType = activeCard.type_line || 'N/A';
        const cardMana = activeCard.mana_cost || 'N/A';
        const cardRarity = activeCard.rarity || 'N/A';
        const cardOracle = activeCard.oracle_text || 'Sem texto disponível.';

        detailContent.className = '';
        detailContent.innerHTML = `
          <div class="detail-grid">
            <div class="detail-card">
              <div class="detail-image-wrap card-media">
                <img src="${activeCard.image_uris?.normal || activeCard.image_uris?.art_crop || getCardImage(card, normalizedFace)}" alt="${escapeHtml(
          getCardTitle(card, normalizedFace)
        )}" />
                <span
                  class="card-rotate-btn"
                  id="detailRotateBtn"
                  title="Ver outra face"
                  aria-label="Ver outra face"
                  ${canRotate ? '' : 'hidden'}
                >↻</span>
              </div>
            </div>
            <div class="detail-text">
              <h3 style="margin-top: 0;">${escapeHtml(getCardTitle(card, normalizedFace))}</h3>
              <p><strong>Face:</strong> ${normalizedFace + 1} / ${totalFaces}</p>
              <p><strong>Tipo:</strong> ${escapeHtml(cardType)}</p>
              <p><strong>Mana:</strong> ${manaMarkup || cardMana}</p>
              <p><strong>Raridade:</strong> ${escapeHtml(cardRarity)}</p>
              <p><strong>Set:</strong> ${escapeHtml(card.set_name || 'N/A')} (${escapeHtml(card.set || 'N/A')})</p>
              <p><strong>Oracle text:</strong> ${escapeHtml(cardOracle)}</p>
            </div>
          </div>
        `;

        const detailRotateBtn = document.getElementById('detailRotateBtn');
        if (detailRotateBtn && canRotate) {
          detailRotateBtn.addEventListener(
            'click',
            (event) => {
              event.preventDefault();
              event.stopPropagation();
              showCardDetails(card, normalizedFace + 1);
            },
            { once: true }
          );
        }

        similarWrap.style.display = 'block';
        clearCards(similarCardsEl);
        similarCardsEl.innerHTML = `<div class="empty-state">Buscando cartas parecidas...</div>`;

        try {
          await rankAndRenderSimilarCards(card, normalizedFace);
        } catch (error) {
          similarCardsEl.innerHTML = `<div class="empty-state" style="color: var(--danger)">Erro ao buscar parecidas: ${error.message}</div>`;
        }
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        searchCards();
      });

      queryInput.addEventListener('input', () => {
        if (autocompleteTimer) clearTimeout(autocompleteTimer);
        autocompleteTimer = setTimeout(() => {
          loadSuggestions(queryInput.value);
        }, AUTOCOMPLETE_DELAY_MS);
      });

      queryInput.addEventListener('blur', () => {
        setTimeout(() => clearSuggestions(), 120);
      });

      queryInput.value = 'Lightning Bolt';
      searchCards();
    </script>
  </body>
</html>
